 bastion_init_NAME: "Бастионная система"
 bastion_init_DESC: "Старт в Сартинайнской системе; столица Империи Фела в эпоху Наследия."
 felcoruscant_init_NAME: "Имперский центр Фела"
 felcoruscant_init_DESC: "Старт в системе Корусанта; вторая столица Империи Фела в эпоху Наследия. После Юужань-вонгской войны орбита и спутники планеты были изменены."
 imperial_headquarters_coruscant: "Имперский штаб"
 imperial_headquarters_coruscant_desc: "Имперское Верховное Командование — оперативный центр империи, расположенный сейчас на Корусанте."
 imperial_headquarters_bastion: "Имперский штаб"
 imperial_headquarters_bastion_desc: "Расположенное на Бастионе Имперское верховное командование служит командным центром Империи Фела."
 igbc_headquarters: "Штаб-квартира IGBC"
 igbc_headquarters_desc: "Муунилинст является домом для штаб-квартиры Межгалактического банковского клана, огромной и могущественной торговой гильдии. Банковский клан опирается на огромное богатство и влияние Муунилинста, позволяющего предоставлять свои услуги по всей известной галактике."
 harnaidan_city: "Харнайдан-Сити"
 harnaidan_city_desc: "Столица Муунилинст и дом IGBC. Этот город опирается на огромное богатство природных ресурсов, полученных в результате уникальной геологической активности планеты. Сочетание жидкого железного ядра, сильного магнитного поля и активной вулканической поверхности создает сеть «Курильщиков», представляющих собой конические подводные вулканы и жерла, извергающие богатые минералы в мелководные океаны Муунилинста. Легкий доступ к этим огромным ресурсам обеспечивает планете невероятную торговую ценность и гарантированный кредит во всей известной галактике."
 ravelin_city: "Рэвелин Сити"
 ravelin_city_desc: "Столица Бастиона и место расположения Императорского дворца династии Фел. Сам город тщательно охраняется и считается одним из безопасных миров-крепостей в галактике."
 yaga_minor_shipyards: "Малые Верфи Яги"
 yaga_minor_shipyards_desc: "Огромная верфь, широко известная своими судостроительными возможностями."
 yagai_species: "Ягай"
 yagai_species_desc: "Малая Яга является домом для видов насекомых, известных своими природными способностями к машиностроению и судостроению."
 nova_crystals: "Кристаллы Новы"
 nova_crystals_desc: "Эти кристаллы, найденные на планете Майгито, являются очень ценным товаром в галактике. Несмотря на нестабильность и летучесть, эти кристаллы, будучи очищенными, могут быть использованы для самых разных целей, начиная от импровизированных энергетических кредитов, предметов роскоши и даже компонентов мощного оружия."
 building_felimperialpalaceb: "Императорский дворец династии Фел"
 building_felimperialpalaceb_desc: "Массивное сооружение, в котором расположены штаб-квартира Имперских рыцарей, Совет моффов и Императорский трон."
 building_felimperialpalacec: "Императорский дворец Корусанта"
 building_felimperialpalacec_desc: "Массивное сооружение, в котором расположены штаб-квартира Имперских рыцарей, Совет моффов и Императорский трон."
 building_fel_knight_academy: "Академия Имперского Рыцаря"
 building_fel_knight_academy_desc: "Учебные центры, используемые для набора и обучения Имперских Рыцарей, высококвалифицированных практиков, служащих Имперской Династии и поддерживающих порядок в этом мире."
 job_imperial_knight: "Имперский рыцарь"
 job_imperial_knight_plural: "Имперские рыцари"
 job_imperial_knight_desc: "Практикующие Силу, верные Императору. Долг Имперского Рыцаря — защищать Императора/Императрицу и поддерживать их авторитет в правительстве. Служит комбинацией профессий телепата и солдата."
 job_imperial_knight_effect_desc: "£job_imperial_knight£ $job_imperial_knight_plural$ используйте $r_alloys$ для предоставления £mod_country_naval_cap_add£ §YВоенно-морской потенциал§!, £defense_army£ §YАрмии обороны§!, £mod_planet_stability_add£ §YПланета Стабильность§! и £unity £ §YUnity§!."
