 torcoreworlds_init_NAME: "Центральные миры (Swtor)"
 torcoreworlds_init_DESC: "Старт в системе Корусанта; столица Галактической Республики во время Великой галактической войны. Этот инициализатор также включает системы Тайтон, Аксум, Кореллия и Куат."
 ruined_jedi_temple: "Разрушенный храм джедаев"
 ruined_jedi_temple_desc: "После разграбления Корусанта Храм джедаев был разрушен в последовавшем хаосе. Без присутствия джедаев на планете возросла преступность и беспорядки."
 senate_building: "Здание Сената"
 senate_building_desc: "В этом здании живут тысячи сенаторов от миров-членов Республики."
 torcoruscant_underworld: "Подземный мир Корусанта"
 torcoruscant_underworld_desc: "Подземный мир Корусанта расположен в километре под массивными небоскребами на поверхности. Чем глубже человек погружается под поверхность, тем более опасным и преступным он становится."
 green_jedi_enclave: "Анклав зеленых джедаев"
 green_jedi_enclave_desc: "В этом храме обитают Зеленые джедаи, присягнувшие чувствительным к силе защитникам Кореллии. Их присутствие повышает стабильность планеты и служит неотъемлемой частью ее защиты."
 tython_jedi_temple: "Храм джедаев Тайтона"
 tython_jedi_temple_desc: "После разрушения Храма джедаев на Корусанте Орден джедаев перенес свою штаб-квартиру на Тайтон, древнюю планету, которую некоторые историки считают местом рождения джедаев."
 building_jedienclave: "Анклав джедаев"
 building_jedienclave_desc: "Анклавы джедаев, служившие небольшими тренировочными и оборонительными объектами на спутниках, были доверенными лицами Храма джедаев на Корусанте."
 building_jeditemple: "Храм джедаев"
 building_jeditemple_desc: "В этом здании сейчас находится штаб-квартира Ордена джедаев. Он содержит специализированные учебные, бюрократические и общежития для джедаев."
 tech_gal_republic_army: "Республиканские военные"
 tech_gal_republic_army_desc: "Военная армия Галактической Республики."
 trait_jedi: "Чувствителен к силе"
 trait_jedi_desc: "Некоторые представители этого вида обладают чувствительностью к силе и посвятили себя учению Ордена джедаев. Разблокирует типы армии джедаев."
 leader_trait_jedi_scientist: "Джедай-следопыт"
 leader_trait_jedi_scientist_desc: "Джедаи, искусные исследователи, исследующие и раскапывающие древние артефакты с помощью Силы."
 leader_trait_jedi_governor: "Джедай-арбитр"
 leader_trait_jedi_governor_desc: "Джедаи-консулы и опытные переговорщики, искусные администраторы."
 leader_trait_jedi_general: "Генерал-джедай"
 leader_trait_jedi_general_desc: "Рыцари и мастера-джедаи, избранные для руководства армиями в битвах."
 leader_trait_jedi_admiral: "Высший генерал-джедай"
 leader_trait_jedi_admiral_desc: "Мастерам-джедаям поручено руководить флотами, используя Силу для прогнозирования движения флота противника."
 leader_trait_jedi_ruler: "Великий магистр джедаев"
 leader_trait_jedi_ruler_desc: "Джедай высшего ранга, являющийся признанным главой Ордена."
 leader_trait_jedi: "Джедай"
 leader_trait_jedi_desc: "Член ордена практиков Силы, служившего светлой стороне Силы."
 torsith: "ТОР Ситхи"
 torsith_desc: "Ситхи Империи."
 torsith_adj: "Ситхи"
 torsith_plural: "Ситхи"
 torsith_insult_01: "отродье ситхов"
 torsith_insult_plural_01: "ситхи-отбросы"
 torsith_compliment_01: "Темный Лорд"
 torsith_compliment_plural_01: "Темные Лорды"
