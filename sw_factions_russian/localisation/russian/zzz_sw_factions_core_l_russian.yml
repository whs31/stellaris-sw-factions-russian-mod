 name_list_torsith: "ТОР Ситхи"
 leader_trait_sith_emperor: "Император ситхов"
 leader_trait_sith_emperor_desc: "Верховный правитель Империи ситхов и повелитель тёмной стороны Силы. Император ситхов — высший."
 dromund_init_NAME: "Система Дромунд"
 dromund_init_DESC: "Запустите систему Дромунд; нынешняя столица Империи ситхов. Также включает системы Коррибан и Зиост."
 dark_temple: "Темный храм"
 dark_temple_desc: "Древнее сооружение ситхов, построенное тысячелетия назад. Его продолжительное присутствие тёмной стороны возле могилы вызывает галлюцинации, а в худших случаях - жестокие одержимости для любого, кто достаточно глуп, чтобы рискнуть войти внутрь."
 jungle_beasts: "Смертельные джунгли"
 jungle_beasts_desc: "Джунгли Дромунд-Кааса являются домом для множества смертоносных и злобных существ."
 slave_revolts: "Восстания рабов"
 slave_revolts_desc: "Восстания рабов широко распространены и свирепствуют на Дромунд-Каасе, но совершенно бесполезны."
 torsith_academy: "Академия ситхов"
 torsith_academy_desc: "Академия — древний тренировочный центр ситхов. Ситхи запрещают убийство прислужников в присутствии свидетелей, но несчастные случаи могут случиться."
 torvalley_of_the_dark_lords: "Долина Темных Лордов"
 torvalley_of_the_dark_lords_desc: "Обширный некрополь, в котором находятся гробницы древних лордов ситхов далекого прошлого. Центр темных знаний и силы."
 imperial_base: "Командный центр орбитальной обороны"
 imperial_base_desc: "Военная база на Зиосте, служащая местной штаб-квартирой Министерства логистики."
 new_adasta: "Новая Адаста"
 new_adasta_desc: "Столица Зиост и крупный экономический, политический и населенный центр."
 building_sanitarium: "Санаторий"
 building_sanitarium_desc: "Единственное жилое сооружение на Нафеме. Это сооружение служит частным хранилищем и исследовательским центром Императора ситхов. Охраняемые фанатиками Нафемы, обученные пользователи силы, которым промыли мозги и экспериментировали, чтобы выжить в пустоте планеты, служат беспокойными стражами объекта."
 dread_palace: "Крепость Ужаса"
 dread_palace_desc: "Бастион, построенный Повелителями ужаса на вулканической луне Орикон для изучения опасных артефактов ситхов, включая устройства Фобиса. Дворец Ужаса — это крепость и центр темной энергии, исходящей из его центральной башни. Эта подавляющая аура хаоса может свести разумы даже самых могущественных пользователей силы с ума."
 civic_sith_emperor: "Император ситхов"
 civic_sith_emperor_desc: "Титул сильнейшего ситха Империи ситхов. Первый Император ситхов, носивший этот титул, провел ужасающий ритуал на своей родной планете, принеся в жертву восемь тысяч лордов ситхов и все формы жизни на планете, чтобы напитать свою подавляющую силу. Выбор этого гражданского общества добавит черту §YSith Emperor§! к вашему начальному правителю, предоставляя ему бессмертие и мощные модификаторы, распространяющиеся на всю империю."
 civic_dark_council: "Тёмный совет ситхов"
 civic_dark_council_desc: "Правящий совет нескольких могущественных лордов ситхов. Каждый член управляет одной из нескольких сфер влияния, которые управляют одним конкретным аспектом Империи ситхов. Позиция в Тёмном Совете сильно оспаривается многими амбициозными ситхами, находящимися ниже них. Постоянная беспощадная политика и политические убийства вызывают крайнюю нестабильность, поскольку срок полномочий членов Тёмного совета зависит от того, насколько хорошо они могут играть в игру. §YОткрывает политику сфер влияния.§!\n\nВ конце концов, ситх - ничто без опоры на власть."
 civic_sith_intelligence: "Разведка ситхов"
 civic_sith_intelligence_desc: "Ранее известная как Имперская разведка, эта разведывательная организация в первую очередь служит империи, занимаясь уловками, запугиванием и убийствами на службе ситхов."
 gov_sith_empire: "Ситхи-империалисты"
 gov_sith_empire_desc: "Авторитарное государство, созданное на основе милитаризма, рабства и тёмной стороны Силы. Члены Ордена ситхов, объединенные под властью одного Императора ситхов или Темного лорда ситхов, поддерживаются бесчисленным количеством лояльных граждан. Империя ситхов отказывается от свободы личности в пользу силы и порядка."
 FLAG_CATEGORY_torsith: "ТОР Ситхи"
 d_kaas_imperial_citadel: "Имперская Цитадель"
 d_kaas_imperial_citadel_desc: "Огромная крепость, построенная в стенах города Каас, служит центральным командным центром Империи ситхов. В его состав входят министерства войны, разведки и логистики, которые координируют все передовые имперские операции. В здании также проживают члены Темного Совета."
 d_kaas_monument: "Шпили Победы"
 d_kaas_monument_desc: "Большой памятник, расположенный в центре Каас-Сити, построенный по заказу Дарта Горгоса как символическое изображение господства ситхов и падения их врагов. \n\nХотя Горгос была убита своим учеником, памятник был завершен ее преемником."
 d_kaas_expansion_district: "Район расширения города Каас"
 d_kaas_expansion_district_desc: "Строительная площадка и расширение Каас-Сити на планете."
 sith_imperial_royal_guard: "Темный почетный караул"
 sith_imperial_royal_guard_desc: "Элитные воины, облаченные в малиновые доспехи, находящиеся под непосредственным командованием Императора ситхов, которым поручено выполнять волю Императора. Многие из почетного караула мысленно связаны с Императором ситхов, что делает их фанатично преданными своему хозяину. Они свирепые воины и лучшие слуги Императора ситхов."
 pc_oricon: "Вулканическая луна"
 pc_oricon_desc: "Пустынная скалистая вулканическая луна, покрытая пеплом и огнем."
 tech_sith_imperial_army: "Имперские военные"
 tech_sith_imperial_army_desc: "Военное подразделение Империи ситхов."
 policy_spheres_of_influence: "Сферы влияния"
 policy_spheres_of_influence_desc: "Двенадцать сфер политики и власти в Империи ситхов. Каждую Сферу, также известную как Пирамиды, возглавлял член Тёмного Совета."
 spheres_of_influence: "Сферы влияния"
 spheres_of_influence_desc: "Двенадцать сфер политики и власти в Империи ситхов. Каждую Сферу, также известную как Пирамиды, возглавлял член Тёмного Совета."
 no_sphere_of_influence: "Никаких предпочтений"
 no_sphere_of_influence_name: "Никаких предпочтений"
 no_sphere_of_influence_desc: "Ни одна из сфер влияния не будет иметь преимущества перед другой (по умолчанию)."
 sphere_of_defense: "Сфера обороны Империи"
 sphere_of_defense_name: "Сфера обороны Империи"
 sphere_of_defense_desc: "Сфера, занимающаяся управлением Имперской армией с целью защиты Империи и ее народа от внешних и внутренних угроз."
 sphere_of_ancient_knowledge: "Сфера древних знаний"
 sphere_of_ancient_knowledge_name: "Сфера древних знаний"
 sphere_of_ancient_knowledge_desc: "Сфера, призванная защищать и расширять знания ситхов. Эта Сфера курировала Имперскую службу освоения и следила за тем, чтобы ситхские артефакты и археологические находки использовались правильно и приносили пользу Ордену ситхов."
 sphere_of_biotic_science: "Сфера биотических наук"
 sphere_of_biotic_science_name: "Сфера биотических наук"
 sphere_of_biotic_science_desc: "Сфера, отвечающая за управление всеми аспектами Империи, связанными с органическим телом. Ситхская алхимия, генетические манипуляции и эксперименты находились под контролем этой Сферы."
 sphere_of_expansion_and_diplomacy: "Сфера расширения и дипломатии"
 sphere_of_expansion_and_diplomacy_name: "Сфера расширения и дипломатии"
 sphere_of_expansion_and_diplomacy_desc: "Сфера, которая курировала расширение границ Империи и руководила Имперской дипломатической службой в ее усилиях по привлечению новых союзников и поддержанию их верности."
 sphere_of_imperial_intelligence: "Сфера Имперской разведки"
 sphere_of_imperial_intelligence_name: "Сфера Имперской разведки"
 sphere_of_imperial_intelligence_desc: "Сфера, которая курировала Министерство разведки во всех разведывательных операциях."
 sphere_of_laws_and_justice: "Сфера права и правосудия"
 sphere_of_laws_and_justice_name: "Сфера права и правосудия"
 sphere_of_laws_and_justice_desc: "Сфера, управлявшая правоохранительной и судебной ветвями Империи. Эта Сфера обеспечивала строгий порядок и эффективность имперского общества, в то время как имперское правосудие сохранялось по всей Империи."
 sphere_of_military_offense: "Сфера военного нападения"
 sphere_of_military_offense_name: "Сфера военного нападения"
 sphere_of_military_offense_desc: "Сфера, которая руководила Имперскими вооруженными силами и Военным министерством во всех наступательных военных операциях, управляя огневой мощью и ресурсами вооруженных сил, чтобы уничтожить врагов Империи и обеспечить их территориальное и военное превосходство."
 sphere_of_military_strategy: "Сфера военной стратегии"
 sphere_of_military_strategy_name: "Сфера военной стратегии"
 sphere_of_military_strategy_desc: "Сфера, которая контролировала планы сражений, стратегии и другие военные процедуры в дополнение к Корпусу консолидации имперских завоеваний."
 sphere_of_mysteries: "Сфера Тайн"
 sphere_of_mysteries_name: "Сфера Тайн"
 sphere_of_mysteries_desc: "Сфера, которой поручено хранить и защищать тайны Империи."
 sphere_of_production_and_logistics: "Сфера производства и логистики"
 sphere_of_production_and_logistics_name: "Сфера производства и логистики"
 sphere_of_production_and_logistics_desc: "Сфера, отвечающая за надзор за Министерством логистики, включая торговые пути Империи, ресурсы, экономику, линии военного снабжения, транспортные системы, национализированные отрасли, рабское население, а также другие активы и программы, необходимые для дальнейшего функционирования Империи."
 sphere_of_sith_philosophy: "Сфера философии ситхов"
 sphere_of_sith_philosophy_name: "Сфера философии ситхов"
 sphere_of_sith_philosophy_desc: "Сфера, которой поручено защищать Кодекс ситхов, обеспечивая верность послушников и учеников Ордена ситхов принципам Ордена."
 sphere_of_technology: "Сфера технологий"
 sphere_of_technology_name: "Сфера технологий"
 sphere_of_technology_desc: "Сфера, которая наблюдает за созданием новой мощной кибернетики, супероружия, военных технологий и других революционных машин на благо Империи."
 eternal_fleet_battlecruiser: "Линейный крейсер Вечного Флота"
 event_eternal_fleet_battlecruiser_key: "Военный корабль Вечного Флота"
 gov_eternal_empire: "Вечная Империя"
 gov_eternal_empire_desc: "Вечная Империя — это Абсолютная монархия, расположенная в Диком Пространстве на планете Закуул. Эту империю изнутри охраняют чувствительные к Силе рыцари Закуула. Его гражданам предоставляется социальное обеспечение, а также свобода исследовать свои собственные желания."
 civic_eternal_throne: "Вечный Трон"
 civic_eternal_throne_desc: "Вечный Трон — это церемониальный центр власти и власти на Закууле. Расположенный на вершине Шпиля, сам трон соединен с подземной гиперволновой ретрансляционной станцией в нескольких километрах под землей, которая обеспечивает достаточно чистой энергии для управления Вечным флотом Закуула в межзвездном пространстве. Император Валкорион использовал этот трон, чтобы управлять Вечной Империей. Выбор этого гражданского общества предоставит вашему начальному правителю черту §YChosen One§!."
 civic_knights_of_zakuul: "Рыцари Закуула"
 civic_knights_of_zakuul_desc: "Присяжные защитники Закуула и Бессмертного Императора, Закууланские Рыцари — это орден чувствительных к Силе блюстителей справедливости, фанатично преданных трону. Открывает §YZakuul Armies.§!"
 the_spire: "Шпиль"
 the_spire_desc: "Шпиль, также известный как золотой мегаполис, представляет собой мегасооружение, в котором живут миллионы жителей Закуула, живущих в полной роскоши."
 heralds_of_zildrog: "Вестники Зилдрога"
 heralds_of_zildrog_desc: "Глубоко в охваченном преступностью городе Брейктаун существует религиозный культ Вестников, поклоняющийся мифическому богу-дракону Зилдрогу. Культ крайне фанатичен и опасен для любого, кто рискует спуститься под Шпиль."
 RT_ETERNAL_EMPEROR: "Вечный Император"
 RT_ETERNAL_EMPRESS: "Вечная Императрица"
 HT_HIGH_JUSTICE_FEMALE: "Вечная принцесса"
 councilor_zakuul_high_justice: "Верховный судья"
 councilor_zakuul_high_justice_female: "Верховный судья"
 councilor_zakuul_high_justice_desc: "$TITLE$ — это позиция высшей власти, уступающая только Вечному Императору, являющемуся главой вооруженных сил Вечной Империи."
 councilor_zakuul_exarch_commander: "Командир Экзарха"
 councilor_zakuul_exarch_commander_female: "Командир Экзарха"
 councilor_zakuul_exarch_commander_desc: "$TITLE$ — это высокое воинское звание среди Рыцарей Закуула, выступающее как военачальниками, так и квазирелигиозными губернаторами целых секторов."
 zakuul_init_NAME: "Система Закуула"
 zakuul_init_DESC: "Запускаем в системе Закуул; столица Вечной Империи."
 leader_trait_zakuul_emperor: "Дракон Закуула"
 leader_trait_zakuul_emperor_desc: "Бессмертный Император считается живым божеством и предсказанным Демоном-Спасителем среди теперь объединенных кочевых племен Закуула. Этот человек обладает огромной мощью в Силе и в десять раз ускорил технологическое развитие Закуулана."
 leader_trait_zakuul: "Рыцарь Закуула"
 leader_trait_zakuul_desc: "Орден чувствительных к Силе воинов, отпрысков и практиков, служащих Вечному Трону Закуула."
 zakuul: "Закуулан"
 zakuul_desc: "Люди, уроженцы планеты Закуул."
 zakuul_adj: "Закуулан"
 zakuul_plural: "Закууланцы"
 zakuul_insult_01: "высокомерный империалист"
 zakuul_insult_plural_01: "высокомерные империалисты"
