 legacy_tie_predator_fighters: "Эскадрилья TIE «Хищники»"
 legacy_tie_predator_fighters_desc: "Модернизированный вариант оригинального TIE-истребителя со щитами и повышенной маневренностью."
 legacy_tie_neutralizer_bombers: "Эскадрилья бомбардировщиков-нейтрализаторов TIE"
 legacy_tie_neutralizer_bombers_desc: "Модернизированный вариант оригинального TIE-бомбардировщика с более сильными щитами и более быстрой маневренностью."
 krayt_imperial_stormtroopers: "Легион штурмовиков"
 krayt_imperial_stormtroopers_desc: "Элитные солдаты Новой Империи, облаченные в белый пластоидно-композитный бронежилет, эти солдаты оснащены улучшенной броней и оружием по сравнению со своими предшественниками."
 krayt_imperial_stormtrooper_garrison: "Гарнизон штурмовиков"
 krayt_imperial_stormtrooper_garrison_desc: "Оборонительный гарнизон элитных штурмовиков."
 krayt_sith_troopers: "Солдаты ситхов"
 krayt_sith_troopers_desc: "Элитные и могущественные воины ситхов, усовершенствованные с помощью кибернетики и ставшие фанатично преданными и послушными слугами Дарта Крайта."
 krayt_sith_trooper_limit_tooltip: "Ограничение: 10 отрядов солдат ситхов одновременно."
 krayt_sith_trooper_count: "Подсчет отряда солдат ситхов"
 FLAG_CATEGORY_krayt: "Империя Крайта"
 name_list_krayt: "Империя Крайта"
 gov_one_sith_empire: "Единые ситхи-империалисты"
 gov_one_sith_empire_desc: "Абсолютная монархия, управляемая Единым ситхом и Императором ситхов."
 RT_SITH_EMPEROR: "Император ситхов"
 RT_SITH_EMPRESS: "Императрица ситхов"
 HT_SITH_VOICE: "Голос"
 HT_SITH_VOICE_FEMALE: "Голос"
 civic_one_sith: "Один ситх"
 civic_one_sith_desc: "Культ ситхов, основанный Дартом Крайтом, самопровозглашенным Темным лордом ситхов. Разница между Едиными ситхами и их предшественниками заключалась в том, что все ситхи связаны верностью и преданностью новому порядку, и в результате они стали более сплоченными для достижения общей цели и с меньшей вероятностью нападут друг на друга. Однако это не означает, что ситхи не желают добиваться собственного развития..."
 councilor_one_sith_voice: "Голос"
 councilor_one_sith_voice_female: "Голос"
 councilor_one_sith_voice_desc: "$TITLE$ — это звание, присвоенное в Ордене Единых ситхов, которое отражало волю Единого Императора ситхов. Эта позиция также применима к титулу регента империи как заместителя императора."
