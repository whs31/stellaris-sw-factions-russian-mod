 name_list_oldsith: "Старая Империя ситхов"
 origin_korriban: "Восстание ситхов"
 origin_korriban_desc: "Старт на Коррибане; древний родной мир ситхов и мир-гробница многих могущественных Темных лордов ситхов."
 origin_tooltip_korriban_effects: "- Запустите систему §YHoruset §! на §YKorriban§!. Включает несколько систем в Пространстве Ситхов."
 stygian_caldera_init_NAME: "Древнее пространство ситхов"
 stygian_caldera_init_DESC: "Область космоса, где расположено несколько важных миров ситхов Древней Империи ситхов, включая священные миры, такие как Коррибан, Зиост, Хар-Дельба, Релг и Крайисс-Два."
 ancient_horuset_init_NAME: "Древний Хорусет"
 ancient_horuset_init_DESC: "Старт в системе Хорусет на Коррибане; родной мир ситхов во времена Старой Империи ситхов."
 trait_massassi: "Массасси"
 trait_massassi_desc: "Массасси, подвид древней расы ситхов, — крупные, внушительные и грозные воины кастовой системы ситхов. Они живут только для того, чтобы служить своим хозяевам."
 START_SCREEN_PART_ONE_KORRIBAN: "С незапамятных времен наша цивилизация развивалась в этом пустынном мире, ведя варварский и гедонистический образ жизни, одновременно принимая темную сторону Силы, которая увековечивала постоянное состояние войны среди нашего народа. На протяжении веков мы видели, как наши великие королевства поднимались и падали, когда наши люди вели войну как с нами, так и с инопланетными силами, стремящимися поработить нас, но мы все равно упорствовали. Лишь с приходом Темных джедаев, или Джен'ари, наша империя стала реальностью. Под их верховным руководством наши мелкие ссоры прекратились, и мы объединились под властью Лордов Ситхов. Наша цивилизация вступила в новый золотой век процветания и господства. Объединившись под руководством наших новых хозяев, наши люди поднимутся, чтобы объявить эту галактику своими законными правителями, и все преклонятся перед мощью и славой Империи ситхов."
 sacred_sith_world: "Священный мир ситхов"
 sacred_sith_world_desc: "Один из пяти важных священных миров, составляющих ядро Старой Империи ситхов."
 sith_homeworld: "Родной мир ситхов"
 sith_homeworld_desc: "Коррибан — место рождения и первоначальный родной мир рас ситхов и центр их цивилизации после правления короля ситхов Адаса и их восстания против Бесконечной Империи."
 ancient_sith_capital: "Цитадель Зиост"
 ancient_sith_capital_desc: "Эта крепость, известная как «Великая Цитадель», является центральным элементом столичного мира Империи ситхов после основания Аджунтой Поллом нового Королевства ситхов."
 sith_library_temple: "Библиотека-Храм ситхов"
 sith_library_temple_desc: "Крайисс Два был одним из пяти священных миров ситхов в составе империи. На этой планете располагалась библиотека-храм ситхов, место, где маги чистой ситхской крови собирались и размышляли о темной стороне Силы. Хотя большая часть храма остается погребенной после того, как он был заброшен тысячи лет назад, обелиск ситхов служит воротами в давно забытую библиотеку ситхов."
 naga_fortress: "Крепость Наги Садоу"
 naga_fortress_desc: "Эта огромная крепость, расположенная на луне Хар-Дельба, является центром власти лорда ситхов Наги Садоу и его опоры."
 ludo_fortress: "Крепость Людо Кресша"
 ludo_fortress_desc: "Расположенная на священном мире ситхов Релг, эта цитадель была центром власти лорда ситхов Людо Кресша и его опоры."
 sith_agricultural_world: "Сельскохозяйственный мир ситхов"
 sith_agricultural_world_desc: "Пышный и плодородный мир, Медриас служит сельскохозяйственным миром Империи ситхов. Это также было резиденцией лорда ситхов Драмата, а затем и его внебрачного сына Тенебры..."
 old_republic_army: "Армия Республики"
 old_republic_army_desc: "Военные силы старой республики, набранные из бесчисленных миров."
 old_republic_special_forces: "Республиканский спецназ"
 old_republic_special_forces_desc: "Элитное подразделение республиканских солдат, специализирующееся на различных боевых задачах и специальных операциях. Они лучше экипированы и более опытны, чем рядовые солдаты."
 old_republic_walker: "Республиканский Уокер"
 old_republic_walker_desc: "Двуногий штурмовой шагоход, вооруженный тяжелой лазерной пушкой и гранатометами."
 old_republic_tri_walker: "Республиканский трехходок"
 old_republic_tri_walker_desc: "Большой трехногий осадный шагоход, используемый для тяжелых боевых действий, вооруженный двумя тяжелыми лазерными пушками и минометами."
 old_republic_manka_walker: "Бронированный шагоход класса «Манка»"
 old_republic_manka_walker_desc: "Четвероногий бронированный шагоход БТР, используемый в основном для безопасной транспортировки республиканских солдат в бой."
 EMPIRE_DESIGN_REPUBLIC: "Галактическая Республика (GGW)"
 EMPIRE_DESIGN_REPUBLIC_desc: "§BКорусант§!: резиденция правительства и столица Старой Республики.\n\n§BBackground§!: Галактическая Республика — демократический альянс планеты и мегакорпорации, которые ценят демократию, справедливость и свободу, существующую более 20 000 лет. Галактический Сенат — главный руководящий орган Старой Республики, куда сенаторы от миров-членов назначаются для делегирования важных государственных вопросов. Сенат также назначает Верховного канцлера избранным главой и председателем Сената."
 civic_light_side: "Орден джедаев"
 civic_light_side_desc: "Эмоций нет. Есть Мир. Запустите игру с технологией §YPsionic Theory§!."
 civic_galactic_senate: "Галактический Сенат"
 civic_galactic_senate_desc: "Руководящий орган Старой Республики, состоящий из тысяч сенаторов."
 civic_republic_sis: "Служба стратегической информации"
 civic_republic_sis_desc: "Внутреннее и внешнее разведывательное агентство при Галактическом Сенате, которому поручено наблюдение, расшифровка и шпионаж."
 RT_SUPREME_CHANCELLOR: "Верховный канцлер"
 RT_SUPREME_CHANCELLOR_FEMALE: "Верховный канцлер"
