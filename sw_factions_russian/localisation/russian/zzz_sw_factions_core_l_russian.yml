 name_list_gar: "Галактическая Республика"
 name_list_gar_clones: "Армия клонов"
 FLAG_CATEGORY_GAR: "ГАР"
 cwcoruscant_init_NAME: "Корусант (CW)"
 cwcoruscant_init_DESC: "Старт в системе Корусант; столица Галактической Республики во время Войн клонов. Этот инициализатор также включает системы Аксум, Куат и Камино."
 cwimpcoruscant_init_NAME: "Имперский Центр (ROTS)"
 cwimpcoruscant_init_DESC: "Начните с Имперского центра, переименованной столицы ранней Галактической Империи после окончания Войн клонов. Этот инициализатор также включает системы Аксум, Куат и Камино."
 republic_high_command: "Верховное командование Республики"
 republic_high_command_desc: "Во время начала Войн клонов это агентство курировало военные действия Республики на протяжении всего конфликта."
 cwsenate_building: "Здание Сената"
 cwsenate_building_desc: "В этом здании живут тысячи сенаторов из разных миров-членов. К сожалению, за последние несколько столетий Галактический Сенат становился все более коррумпированным и неэффективным."
 kamino_init_NAME: "Система Камино"
 kamino_init_DESC: "Старт в системе Камино; родной мир каминоанских клонеров. Этот инициализатор также включает в себя: Ротану, Риши и систему Укио."
 tipoca_city: "Типока Сити"
 tipoca_city_desc: "Этот город является столицей Камино. Миллионы каминоанских исследователей и ученых работают в городе, а также взаимодействуют со своими клиентами из других миров. Это также хорошо укреплённое место Каминоанских сил планетарной обороны."
 cloning_facilities: "Средства клонирования"
 cloning_facilities_desc: "Каминоанская технология клонирования считается высокоразвитой и ценится среди видов галактики. Каминоанцы способны обучать, экипировать и выращивать высокодисциплинированных солдат."
 savage_storms: "Дикие штормы"
 savage_storms_desc: "Насыщенная планета Камино страдает от сильных и мощных штормов, которые почти непрерывно лили на планету дожди."
 raider_cove: "Бухта Рейдеров"
 raider_cove_desc: "Жалкое улей подонков и злодеев, это поселение, расположенное на острове Горизонт, является убежищем для пиратов, контрабандистов и охотников за сокровищами, стремящихся ограбить богатую минералами планету Риши."
 exonium_mines: "Экзониевые рудники"
 exonium_mines_desc: "Уникальное ископаемое топливо, обнаруженное на Риши, которое можно использовать для производства энергии для ряда целей, включая очищенное топливо для космических кораблей."
 rishi_station: "Станция Риши"
 rishi_station_desc: "Расположенная на луне Риши, из-за ее непосредственной близости к системе Камино, Республика построила пост прослушивания, чтобы предупредить их о любом надвигающемся нападении. Станция также оснащена дефлекторным щитом для защиты от случайного метеоритного дождя."
 pc_swmoon: "Луна"
 pc_swmoon_desc: "Бесплодная Луна."
 rothana_heavy_engineering: "Ротана Хэви Инжиниринг"
 rothana_heavy_engineering_desc: "Дочерняя компания Верфи Куата, Ротана превратилась в крупную сеть шахт, фабрик и верфей в системе."
 rothana_shipyards: "Верфи Ротаны"
 rothana_shipyards_desc: "Орбита Ротаны занята сотами верфей и сухих доков с единственной целью — производить высококачественные военные корабли."
 ukio_agri_world: "Передовой сельскохозяйственный мир"
 ukio_agri_world_desc: "Являясь известным аграрным миром, Укио — это планета, известная своим эффективным сельскохозяйственным производством, с вегетационным периодом, продолжающимся большую часть года, сотнями текущих рек для естественного орошения и идеальными условиями для производства зерна и других продуктов питания."
 building_cwjeditemple: "Великий храм джедаев"
 building_cwjeditemple_desc: "Это влиятельное здание является штаб-квартирой Ордена джедаев, монашеского ордена великодушных силовиков, стремящихся обеспечить мир и справедливость по всей Республике. Он содержит специализированные учебные заведения, бюрократические/культурные центры, обширные архивы и общежития, подходящие для всех падаванов-джедаев, рыцарей и мастеров."
 building_cwimperialpalace: "Императорский дворец"
 building_cwimperialpalace_desc: "После того, как Приказ 66 уничтожил то, что осталось от Ордена джедаев, Император Палпатин решил перестроить разрушенный Храм джедаев в свой личный дворец в качестве последнего оскорбления своим самым ненавистным врагам. Дворец представляет собой массивную башню и лабиринт, содержащий личные хранилища Императора, статуи и артефакты ситхов, тщательно охраняемые контингентом королевской гвардии и адептов тёмной стороны."
 tech_separatist_droid_army: "Сепаратистская армия дроидов"
 tech_separatist_droid_army_desc: "Армия дроидов, созданная рабочими Бактоидских боевых автоматов, представляет собой крупнейшее собрание боевых дроидов, созданных для военных целей."
 tech_separatist_droid_vehicles: "Оружейная техника сепаратистов"
 tech_separatist_droid_vehicles_desc: "Транспортные средства, разработанные мегакорпорациями, дополнили огромную армию дроидов, начиная от легких спидеров и заканчивая тяжеловооруженными танками."
 b1_battle_droid_army: "Боевые дроиды серии B1"
 b1_battle_droid_army_desc: "Большой отряд дешевых, хлипких и одноразовых боевых дроидов, которые лучше всего использовать в больших количествах в качестве компенсации. Обычно вооружен бластерными винтовками Е-5."
 b2_battle_droid_army: "Боевые супердроиды серии B2"
 b2_battle_droid_army_desc: "Модернизированный вариант серии B1, оснащенный более прочной броней и встроенными наручными бластерами и ракетными установками."
 b3_battle_droid_army: "Ультра боевой дроид серии B3"
 b3_battle_droid_army_desc: "Экспериментальный и тяжеловооруженный вариант боевого супердроида B2, оснащенный разнообразными выдвижными бластерными пушками, ракетными установками, огнеметами и плазменной пушкой с широким диапазоном распыления, способной нанести широкомасштабный побочный ущерб."
 destroyer_droid_army: "Дройдекас"
 destroyer_droid_army_desc: "Мощные и дорогие противопехотные тяжелые боевые дроиды, оснащенные мощным персональным дефлекторным щитом, вооруженные парой скорострельных спаренных бластерных пушек и способные переходить в колесную форму для быстрого перемещения на большие расстояния."
 commando_droid_army: "Дроиды-коммандос серии BX"
 commando_droid_army_desc: "Усовершенствованный вариант боевого дроида серии B1, предназначенный для проникновения и скрытных действий в тылу противника. Эти дроиды очень безжалостны, смертоносны и адаптивны. Обычно вооружен бластерной винтовкой Е-5 и вибромечом для ближнего боя."
 magnaguard_droid_army: "IG-100 Магна Стражи"
 magnaguard_droid_army_desc: "Самомотивирующиеся эвристически запрограммированные боевые дроиды, которые служат личными телохранителями и высокоспециализированной пехотой на поле боя. Эти дроиды способны на сверхчеловеческую акробатику, скорость, подпрограммы адаптивного обучения и боевые способности. Обычно вооружены электропосохами или ракетными винтовками «Бульдог»."
 stap_repulsorcraft: "Спидеры STAP"
 stap_repulsorcraft_desc: "Одноместные воздушные платформы, предназначенные для разведки и патрулирования, вооруженные парой бластерных пушек."
 ground_armored_tank: "Наземные бронетанки"
 ground_armored_tank_desc: "Легкие танки, пилотируемые встроенным дроидным мозгом, вооруженные двумя средними лазерными пушками и двумя ракетными установками для разведки и перехвата."
 armored_assault_tank: "Штурмовые бронированные танки"
 armored_assault_tank_desc: "Репульсорные танки среднего размера, используемые для тяжелых лобовых атак и вооруженные одной тяжелой лазерной пушкой, двумя магазинными бластерными пушками, двумя легкими бластерными пушками и системой пусковых установок с цепным питанием."
 heavy_artillery_gun_mortar_tank: "Тяжелые артиллерийские минометные танки"
 heavy_artillery_gun_mortar_tank_desc: "Бронированные репульсорные танки со встроенным мозгом дроида, используемые в качестве мобильного артиллерийского орудия, вооруженного одной тяжелой энергетической снарядной пушкой."
 hailfire_droid_tank: "Дроид-танки IG-227 класса «Град»"
 hailfire_droid_tank_desc: "Колесная ракетная платформа со встроенным мозгом дроида, используемая для пробития тяжелой брони и оснащенная множеством мощных ракетных пусковых установок."
 persuader_droid_enforcer_tank: "NR-N99 Дроиды-силовики класса «Убеждение»"
 persuader_droid_enforcer_tank_desc: "Колесные дроиды-танки, тяжело вооруженные набором ионных пушек, тяжелыми многозарядными бластерами и пусковыми установками для ударных ракет, используемых для тяжелых лобовых атак. В отличие от других дроидов-танков, этот дроид-танк будет уделять приоритетное внимание сопутствующему урону во время атак."
 droid_super_tank: "Супертанки Бактоид"
 droid_super_tank_desc: "Большие экспериментальные тяжелобронированные танки, вооруженные спаренными бластерными пушками, лазерными пушками и скрытыми спаренными пусковыми установками с боеголовками в качестве мобильной артиллерийской платформы."
 protodeka_tank: "Протодека"
 protodeka_tank_desc: "Массивный тяжеловооруженный и бронированный дроид-репульсорный танк, оснащенный скорострельными турболазерами и смертоносными ракетными установками самонаведения, используемый в качестве беспощадного мобильного наземного осадного орудия. Он также оснащен излучателем сейсмических волн для максимального увеличения сопутствующего ущерба."
 vulture_droid_squadron: "Дроиды-истребители класса «Стервятник»"
 vulture_droid_squadron_desc: "Самоходные боевые дроиды с изменяемой геометрией — это быстрые беспилотные истребители, используемые для перехвата, рассчитывая на превосходящую численность во время боя. Эти дроиды также способны трансформироваться в режим шагателя, чтобы при необходимости дополнять наземные силы."
 hyena_bomber_droid_squadron: "Дроиды-бомбардировщики типа «Гиена»"
 hyena_bomber_droid_squadron_desc: "Беспилотные тяжелые артиллерийские корабли, вооруженные ракетными портами и бомболюками, оснащенными протонными бомбами, предназначенные для ковровых бомбардировок наземных целей или крупных кораблей."
 hmp_droid_gunship: "Боевые корабли HMP-дроидов"
 hmp_droid_gunship_desc: "Большой беспилотный репульсорный корабль, оснащенный энергетической защитой и тяжеловооруженный двумя средними лазерными пушками, а также регулируемыми ракетными пусковыми установками и торпедами."
 dwarf_spider_droid: "DSD1 Карликовые дроиды-пауки"
 dwarf_spider_droid_desc: "Четвероногие дроиды-ходоходы, используемые в качестве противопехотных средств, вооруженные одной лазерной пушкой и механизмом самоуничтожения для нанесения сопутствующего ущерба."
 homing_spider_droid: "Самонаводящиеся дроиды-пауки OG-9"
 homing_spider_droid_desc: "Большой дроид-ходоход, вооруженный самонаводящимся лазером и противопехотной лазерной пушкой, используемый для различных целей и местности."
 octuptarra_magna_tri_droid: "Тридроид Октуптарра Магна"
 octuptarra_magna_tri_droid_desc: "Большой трехногий шагающий дроид, вооруженный несколькими тяжелыми артиллерийскими установками и лазерными пушками, встроенными во вращающиеся многосоставные узлы для атаки нескольких целей."
 scorpenek_annihilator_droid: "Дроид-уничтожитель Скорпенек"
 scorpenek_annihilator_droid_desc: "Увеличенный вариант дроидеки, вооруженный двумя сдвоенными скорострельными лазерными пушками и мощным дефлекторным щитом."
 EMPIRE_DESIGN_CIS: "Конфедерация независимых систем"
 EMPIRE_DESIGN_CIS_desc: "СНГ — это конфедерация систем, стремящихся к независимости от Галактической Республики и ее коррупции."
 gov_separatist_alliance: "Альянс сепаратистов"
 gov_separatist_alliance_desc: "Конфедерация независимых систем — это союз тысяч планет, стремящихся к независимости от Республики."
 RT_HEAD_OF_STATE: "Глава государства"
 RT_HEAD_OF_STATE_FEMALE: "Глава государства"
 civic_separatist_council: "Совет Сепаратистов"
 civic_separatist_council_desc: "Ведущий исполнительный корпус, отвечающий за Конфедерацию независимых систем, состоит из богатых бизнес-магнатов, политиков и благотворителей, включая Торговую федерацию, Техносоюз, Межгалактический банковский клан, Коммерческую гильдию и Корпоративный альянс, которые вложили свои огромные ресурсы в СНГ."
 civic_separatist_droid_army: "Сепаратистская армия дроидов"
 civic_separatist_droid_army_desc: "Армия дроидов, сформированная из сил безопасности нескольких галактических мегакорпораций, таких как Торговая федерация и Техносоюз, является основной боевой силой Конфедерации. Эта армия оптимизирована по количеству, а не по качеству. При выборе этого гражданского устройства в начале игры разблокируются технологии §YДроиды§! и §YСистема шаблонов машин§!."
 civic_machine_separatist_droid_army: "Сепаратистская армия дроидов"
 civic_machine_separatist_droid_army_desc: "Армия дроидов, сформированная из сил безопасности нескольких галактических мегакорпораций, таких как Торговая федерация и Техносоюз, является основной боевой силой Конфедерации. Эта армия оптимизирована по количеству, а не по качеству. Выбор этого гражданского устройства откроет технологию §YDroids Technology§! и §YСистема шаблонов машин §!, а также четырех тактических дроидов в начале игры."
 civic_cyborg_general: "Генерал киборгов"
 civic_cyborg_general_desc: "Чтобы командовать бесконечными легионами Сепаратистской армии дроидов, нужен был Верховный главнокомандующий. Дополненный лучшими умами галактики усовершенствованной кибернетикой, один военачальник был выбран, чтобы стать величайшим воином. Выбор этого гражданского общества откроет черту §YКибернетика§! и §YВоинственная черта§! для вашего стартового правителя."
 civic_machine_cyborg_general: "Генерал Киборг"
 civic_machine_cyborg_general_desc: "Чтобы командовать бесконечными легионами Сепаратистской армии дроидов, нужен был Верховный главнокомандующий. Дополненный лучшими умами галактики усовершенствованной кибернетикой, один военачальник был выбран, чтобы стать величайшим воином. Выбор этого гражданского общества откроет черту §YКибернетика§! и §YВоинственная черта§! для вашего стартового правителя."
 trait_robot_tacticaldroid: "Тактический дроид"
 trait_robot_tacticaldroid_desc: "Дроид, специально созданный для командования армиями и выполнения административных обязанностей там, где органическое лидерство недоступно. Эти высокоинтеллектуальные модели дроидов обладают передовыми когнитивными модулями, которые быстро обрабатывают огромные объемы данных и постоянно моделируют предстоящий бой, рассчитывая шансы для разработки эффективных стратегий."
 trait_robot_battledroid: "Боевой дроид"
 trait_robot_battledroid_desc: "Дроид IV класса, созданный специально для ведения войны. Полностью одноразовый и легко заменяемый."
