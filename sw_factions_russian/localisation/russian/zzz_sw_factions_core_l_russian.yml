 GAL_EMPIRE_PHASE_III_DARKTROOPERS_ORD: "$O$ Рота тёмных солдат фазы III"
 GAL_EMPIRE_501_LEGION_ORD: "$O$ 501-й батальон штурмовиков"
 GAL_EMPIRE_IMPERIAL_ROYAL_GUARD_ORD: "$O$ Полк Имперской Королевской Гвардии"
 GAL_EMPIRE_IMPERIAL_SOVEREIGN_PROTECTORS: "$O$ Имперский полк Суверенного Защитника"
 GAL_EMPIRE_IMPERIAL_INQUISITORS: "$O$ Имперские инквизиторы"
 GAL_EMPIRE_TIE_MAULER_ORD: "$O$ ap-1 Штурмовая эскадрилья TIE «Маулер»"
