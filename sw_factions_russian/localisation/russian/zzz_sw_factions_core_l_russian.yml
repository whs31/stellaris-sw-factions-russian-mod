 FLAG_CATEGORY_oldrepublic: "КОТОР Республика"
 name_list_oldrepublic: "КОТОР Республика"
 kotorcoreworlds_init_NAME: "Космос Республики (КОТОР)"
 kotorcoreworlds_init_DESC: "Старт в системе Корусанта; столица Галактической Республики во время Гражданской войны джедаев. Этот инициализатор также включает системы Аксум, Фоэрост, Кореллия, Дуро, Дантуин и Рендили."
 foerost_shipyards: "Верфи Фоэрост"
 foerost_shipyards_desc: "Одна из крупнейших и старейших известных верфей в республиканском пространстве. Эта верфь получает сырье прямо с поверхности планеты."
 rendili_stardrive: "Рендили Гиперворкс"
 rendili_stardrive_desc: "Компания по производству звездолетов, старейшая, как сама Республика, Rendili Hyperworks, была основным поставщиком Республиканского флота. На планете имеется обширное множество верфей, сухих доков и ремонтных предприятий."
 dantooine_jedi_enclave: "Анклав джедаев Дантуина"
 dantooine_jedi_enclave_desc: "Секретная академия, управляемая Орденом джедаев на Дантуине, которая готовила только кандидатов с самым высоким потенциалом в Силе. Академия джедаев также помогала местным поселенцам урегулировать споры, поддерживать безопасность планеты и защищать поселенцев от наемников-рейдеров."
 dantooine_settlers: "Поселенцы Кунда"
 dantooine_settlers_desc: "На планете проживает местное сообщество поселенцев, колонизировавших планету. Некоторые из этих поселенцев происходят из благородных семей Республики, которые хотели уйти от городской жизни, например семьи Матале и Сандрал. Однако эти две благородные семьи обычно находятся в постоянной вражде друг с другом. Местное ополчение также призвано защищать свой народ от хищных гончих и наемников-рейдеров, которые представляют собой постоянную угрозу на планете."
 mercenary_raiders: "Наемные рейдеры"
 mercenary_raiders_desc: "Постоянная угроза Дантуину: наемники со всей галактики приезжают на планету, чтобы грабить и совершать набеги на несколько ферм и домов, что становится большой проблемой для относительно мирных жителей Дантуина."
 polluted_wasteland: "Загрязненная пустошь"
 polluted_wasteland_desc: "После разрушений, оставленных мандалорцами, поверхность Дуро представляет собой почти бесплодную промышленную пустошь в дополнение к уже загрязненной поверхности в результате столетий чрезмерного развития. Оставшиеся ресурсы в основном добываются автоматизированными системами."
 requires_colonized_planet_orbital_ring: "$TRIGGER_FAIL$Невозможно строить на орбитах планет, которые не колонизированы и не находятся полностью под вашим контролем."
