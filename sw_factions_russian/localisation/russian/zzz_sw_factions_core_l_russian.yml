 clonetrooper_legion: "Республиканский Легион Клонов"
 clonetrooper_legion_desc: "Высококвалифицированные солдаты-клоны Великой Армии Республики."
 republic_clone_blaze_troopers: "Клон-солдат-пламень"
 republic_clone_blaze_troopers_desc: "Передовое подразделение поддержки пехоты, оснащенное реактивными ранцами и тяжелой силовой броней. Каждый пожарный вооружен встроенным в запястье огнеметом."
 republic_clone_arc_troopers: "Отряд солдат ЭРК"
 republic_clone_arc_troopers_desc: "Advanced Recon Commandos — элитный вариант солдата-клона, служащий в качестве спецназа ВАР для тайных операций."
 republic_clone_commandos: "Отряд клонов-коммандос"
 republic_clone_commandos_desc: "Элитный вариант солдата-клона, которому поручено проводить тайные военные операции в тылу врага. Каждый клон-коммандос оснащен усовершенствованной броней коммандос класса «Катарн» и обычно вооружен сменным оружием DC-17m."
 republic_atrt_walkers: "Ходунки AT-RT"
 republic_atrt_walkers_desc: "Быстрые одноместные двуногие шагоходы-разведчики, вооруженные одной магазинной бластерной пушкой, способной противостоять пехоте."
 republic_saber_tank: "Танк TX-130 Sabre"
 republic_saber_tank_desc: "Репульсорный танк с легким щитом, быстрый и маневренный для своего размера. Вооружен парой тяжелых лазерных пушек со связным огнем и двумя артиллерийскими установками для борьбы с транспортными средствами."
 republic_atxt_walker: "AT-XT Уокер"
 republic_atxt_walker_desc: "Экспериментальный бронированный двуногий шагоход, вооруженный спаренными лазерными пушками и двумя протонными минометами. Он также оснащен экспериментальным генератором плазменного щита для отражения входящего огня."
 republic_atte_walker: "AT-TE Уокер"
 republic_atte_walker_desc: "Бронированный вездеходный шестиногий штурмовой шагоход и десантный транспорт, вооруженный шестью противопехотными лазерными пушками и одной основной пушкой массового поражения."
 republic_atap_walker: "AT-AP Уокер"
 republic_atap_walker_desc: "Трехногая шагающая капсула, используемая для дальних артиллерийских ударов, вооруженная большой тяжелой пушкой массового привода и спинной средней лазерной пушкой."
 republic_turbo_tank: "HAVw A6 Джаггернаут"
 republic_turbo_tank_desc: "Массивный тяжелобронированный десятиколесный танк, вооруженный множеством тяжелых лазерных пушек, скорострельными лазерными пушками, спаренными бластерными пушками и парой больших ракетных установок."
 republic_gunship: "Боевой корабль LAAT/i"
 republic_gunship_desc: "Низковысотный штурмовой транспорт, используемый для перевозки солдат-клонов и огневой поддержки класса «воздух-земля», вооруженный противопехотными турелями, четырьмя пушками с композитным лучом и парой ракетных пусковых установок с массовым приводом."
 tech_republic_clone_army: "Великая Армия Республики"
 tech_republic_clone_army_desc: ", известная как Великая Армия, является основным подразделением Вооружённых сил Галактической Республики, полностью состоящим из солдат-клонов, созданных на основе генетически измененного шаблона охотника за головами Джанго Фетта, выращенного в центрах клонирования на Камино для противодействия растущей угрозе со стороны сепаратистов. Эта армия считается одной из самых профессиональных вооруженных сил в галактике. Разблокирует типы армий ГАР."
 tech_republic_clone_specialists: "Программы обучения специалистов по клонам"
 tech_republic_clone_specialists_desc: "В дополнение к шаблону солдат-клонов каминоанцы также экспериментировали с рядом специальных программ, которые еще больше улучшали шаблон основного клона, увеличивая их физическое мастерство, одновременно отказываясь от стандартной коррекции поведения, внедренной в основную армию клонов. Этими программами также руководили мандалорские военные советники, которые выступали за клонов, способных выполнять секретные миссии, слишком деликатные для стандартных подразделений, в результате чего были созданы одни из самых опытных солдат в галактике."
 tech_republic_vehicles: "Ротана Хэви Инжиниринг"
 tech_republic_vehicles_desc: "Тайная дочерняя компания Верфи Куата, ответственная за производство военной техники для Великой Армии Республики, от спидер-байков и истребителей до больших шагоходов и боевых кораблей для поддержки армии клонов."
 civic_gar: "Каминоанское клонирование"
 civic_gar_desc: "Эти каминоанцы держатся особняком; они клонеры, и чертовски хорошие. Начните игру с клонами-солдатами первой фазы и технологией §YGene Banks§!."
 trait_clonetrooper: "Каминоанский клон"
 trait_clonetrooper_desc: "Высококвалифицированные солдаты-клоны, созданные каминоанцами для боевых действий."
 leader_trait_clone_commander: "Старший командир клонов"
 leader_trait_clone_commander_desc: "Солдаты-клоны высокого ранга, ведущие в бой целые легионы или батальоны клонов."
 clonetrooper: "Солдат-клон"
 clonetrooper_desc: "Клоны каминоанского происхождения."
