 FLAG_CATEGORY_rebels: "Альянс повстанцев"
 civic_rebel_alliance: "Альянс повстанцев"
 civic_rebel_alliance_desc: "Свободный союз различных систем и повстанческих фракций, работающих вместе ради общего дела. Из-за своей кочевой природы они меньше типичных империй, но более привыкли сражаться как аутсайдеры."
 name_list_rebels: "Альянс повстанцев"
 hanna_city: "Ханна Сити"
 hanna_city_desc: "Столица Чандрила — крупный центр туризма и торговли, в котором расположены местные художественные галереи, оперные театры и большие общественные ротонды для политических дискуссий. Сама планета также представляет собой пышный мир со спокойной погодой и природной красотой."
 yavin_system_NAME: "Система Явин"
 yavin_system_DESC: "Старт на Явине IV, одном из спутников газового гиганта Явина. Дак, родной мир Мон-Каламари, также включен в качестве соседней системы."
 building_massassi_great_temple: "Храм Массасси"
 building_massassi_great_temple_desc: "Массивное сооружение, построенное цивилизацией Массасси, расой, поклонявшейся древнему лорду ситхов Экзару Куну на Луне. Сейчас в этом здании находится база Альянса."
 building_jedi_praxeum: "Праксеум джедаев"
 building_jedi_praxeum_desc: "Когда-то штаб-квартира Альянса повстанцев, теперь Люк превратил ее в Академию джедаев для обучения следующего поколения рыцарей-джедаев."
 massassi_temples: "Храмы Массасси"
 massassi_temples_desc: "Древние сооружения, оставленные массасси, примитивной цивилизацией, служившей Старой Империи ситхов. В этих структурах все еще могут храниться древние и ценные артефакты."
 alliance_hq: "Верховное командование Альянса"
 alliance_hq_desc: "Здесь находится Верховное командование Альянса, которое координирует военные действия ячеек Альянса по всей галактике."
 hoth_system_NAME: "Система Хот"
 hoth_system_DESC: "Запустите систему Хот; местонахождение секретной базы Альянса повстанцев."
 echo_base: "База Эхо"
 echo_base_desc: "Отдаленная планета Хот была идеальным местом для создания оперативной базы. Сама база находится на леднике и служит штаб-квартирой Альянса после эвакуации Явина IV."
 frozen_wasteland: "Ледяная пустошь"
 frozen_wasteland_desc: "Поверхность Хота представляет собой почти непригодную для жизни ледяную пустошь, наполненную зубчатыми скалами, пустынными ледяными равнинами и смертоносными метелями. Местные хищники, известные как вампа, представляют собой опасную опасность, отправляясь в отдаленные районы планеты."
 building_hothioncannon: "Планетарная ионная пушка v-150"
 building_hothioncannon_desc: "Ионная пушка земля-орбита, установленная на базе «Эхо» для защиты планеты."
 new_republic_init_NAME: "Системы Новой Республики"
 new_republic_init_DESC: "Старт в системе Корусанта; столица Новой Республики, а также Явин IV и Дак (Мон-Каламари) в качестве соседних планет."
 new_republic_capital: "Столица Новой Республики"
 new_republic_capital_desc: "После изнурительной борьбы с Империей Новая Республика объявила Корусант своей столицей. Известный многим как центр галактики, Корусант — это шумный экуменополис и сердце галактической торговли."
 building_newrepublicsenate: "Здание Сената Новой Республики"
 building_newrepublicsenate_desc: "Сенат Новой Республики, расположенный в старом здании Имперского Сената, наполнен тысячами сенаторов со всей галактики."
 mon_cala_system_NAME: "Система кальмаров"
 mon_cala_system_DESC: "Старт на планете Дак (Каламари); родной мир Мон-Каламари и Куарренов."
 mon_cala_shipyards: "Верфи Мон Кала"
 mon_cala_shipyards_desc: "Крупная судостроительная компания Mon Calamari Shipyards славилась своими элегантными, обтекаемыми конструкциями кораблей, в которых предпочтение отдавалось органическим корпусам, уникальной инженерии и упору на исследовательские и роскошные лайнеры. У них также есть возможность строить мощные военные корабли, которые использовались как Альянсом повстанцев, так и Новой Республикой в ​​войне против Империи."
 coral_city: "Коралловый город"
 coral_city_desc: "Столица Дака и центр торговли планеты. Часть города видна на поверхности Мон-Калы, другая половина, известная как Коралловые глубины, погружена под воду."
 hosnian_init_NAME: "Система Хосниана"
 hosnian_init_DESC: "Начните с Хосниан-Прайм; столица Новой Республики."
 rebel_alliance_army: "Армия Альянса"
 rebel_alliance_army_desc: "Множество сухопутных войск различной квалификации и подготовки, объединенных под одним знаменем. Эти силы нацелены на то, чтобы связать и преследовать силы противника, а не встретиться с ним в открытом бою."
 rebel_alliance_special_forces: "Спецназ Альянса"
 rebel_alliance_special_forces_desc: "Элитные солдаты и коммандос Альянса, используемые для проникновения и уловок."
 rebel_alliance_t2b_tanks: "Репульсорные танки Т-2Б"
 rebel_alliance_t2b_tanks_desc: "Легкая бронированная репульсорная разведывательная машина, оснащенная щитами и вооруженная счетверенными легкими бластерными пушками для атак с разбега."
 rebel_alliance_t4b_tanks: "Тяжелые танки Т-4Б"
 rebel_alliance_t4b_tanks_desc: "Тяжелобронированные универсальные боевые танки, вооруженные тяжелыми лазерными пушками и пусковыми установками для ударных ракет."
 rebel_alliance_mptl2a_artillery: "Артиллерийская платформа МПТЛ-2а"
 rebel_alliance_mptl2a_artillery_desc: "Мобильная гусеничная артиллерийская установка для запуска протонных торпед, используемая для стрельбы залпом протонных торпед из своего бронированного корпуса."
 rebel_alliance_t47_airspeeder_squadron: "Т-47 Эскадрилья аэроспидеров"
 rebel_alliance_t47_airspeeder_squadron_desc: "Аэрспидеры корпорации «Инком», модифицированные Альянсом с двумя двойными лазерными пушками и легкой магазинной бластерной пушкой, используемые для разведки и наступательных атак."
 rebel_alliance_xwing_squadron: "Эскадрилья истребителей T-65 X-Wing"
 rebel_alliance_xwing_squadron_desc: "Мощные универсальные истребители Альянса, известные своей универсальностью и исключительными боевыми характеристиками. Вооружен четырьмя лазерными пушками Taim & Bak KX9 и двумя пусковыми установками протонных торпед для атаки бронированных целей."
 rebel_alliance_ywing_squadron: "BTL бомбардировочная эскадрилья Y-крыла"
 rebel_alliance_ywing_squadron_desc: "Перепрофилированные бронированные республиканские истребители-бомбардировщики, вооруженные двумя лазерными пушками, ионными пушечными турелями, пусковыми установками для протонных торпед и желобом для протонной бомбы, используемым для бомбардировки тяжелобронированных целей."
 FLAG_CATEGORY_fel: "Империя Скверны"
 name_list_fel: "Империя Скверны"
 gov_fel_empire: "Династия Фела"
 gov_fel_empire_desc: "Империя Фела — авторитарная, но в основном доброжелательная монархия, в которой Император обладает полным суверенитетом, но власть разделена между Советом моффов и Адмиралтейством."
 civic_imperial_knights: "Империум Скверны"
 civic_imperial_knights_desc: "Конституционная монархическая империя, реорганизованная из бывшего Осколка Империи под руководством известной семьи Фел. Позволяет нанимать §YИмперских рыцарей§!, открывает технологию §Yпсионическая теория§! и добавляет черту §Yпсихический§! к вашему начальному правителю."
 councilor_fel_imperial_knight_master: "Мастер Имперских Рыцарей"
 councilor_fel_imperial_knight_master_female: "Мастер Имперских Рыцарей"
 councilor_fel_imperial_knight_master_desc: "$TITLE$ — второй по величине ранг среди Имперских Рыцарей, который представляет руководство Ордена при Императоре."
 leader_trait_imperial_knight: "Имперский рыцарь"
 leader_trait_imperial_knight_desc: "Могущественные практики силы, верные династии Фелов. Они полностью обучены путям Силы и являются искусными бойцами на световых мечах на службе трона."
 trait_imperial_knight: "Имперский рыцарь"
 trait_imperial_knight_desc: "Некоторые представители этого вида присоединились к ордену практиков силы, служащему империи."
 fel_imperial_stormtroopers: "Легион штурмовиков"
 fel_imperial_stormtroopers_desc: "Элитные солдаты Новой Империи, облаченные в белый пластоидный композитный бронежилет, эти солдаты оснащены улучшенной броней и оружием по сравнению со своими предшественниками."
 fel_imperial_stormtrooper_garrison: "Гарнизон штурмовиков"
 fel_imperial_stormtrooper_garrison_desc: "Оборонительный гарнизон элитных штурмовиков."
 fel_imperial_501_stormtrooper_legion: "501-й легион штурмовиков"
 fel_imperial_501_stormtrooper_legion_desc: "Элитный легион Штурмовиков и преторианская гвардия династии Фел, состоящий из закаленных в боях солдат с репутацией людей, добившихся победы, несмотря на превосходящие силы."
 fel_imperial_501_legion_limit_tooltip: "Ограничение в 12 батальонов."
 fel_imperial_501_legion_count: "501-й батальон"
 fel_imperial_knights: "Имперские рыцари"
 fel_imperial_knights_desc: "Высококвалифицированные имперские рыцари, верные династии Фелов. Каждый член — могущественный практик силы, одетый в малиново-красные доспехи и вооруженный стандартным серебряным световым мечом, что означает единство и единообразие их ордена. Они опасные бойцы на любом поле боя и будут выполнять волю своего императора любыми необходимыми средствами."
 FEL_IMPERIAL_STORMTROOPER_ORD: "$ORD$ Легион штурмовиков Скверны"
