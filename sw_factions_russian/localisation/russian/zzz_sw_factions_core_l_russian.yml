 FLAG_CATEGORY_cis: "СНГ"
 name_list_cis: "СНГ"
 name_list_cisdroid1: "Дроиды СНГ"
 cis_init_NAME: "Системы СНГ"
 cis_init_DESC: "Столичная система Конфедерации Независимых Систем наряду с такими крупными мирами, как Джеонозис, Серенно и Муунилинст."
 agamar_init_NAME: "Система Агамар"
 agamar_init_DESC: "Запускаем в Системе Агамар; расположение сепаратистского оплота Калани."
 muunilinst_init_NAME: "Система Муунилинст"
 muunilinst_init_DESC: "Старт в богатой минералами системе Муунилинст; крупное поселение Муун и штаб-квартира Межгалактического банковского клана."
 skako_init_NAME: "Система Скако"
 skako_init_DESC: "Запустите в системе Скако; родной мир скакоанцев и штаб-квартира Техносоюза."
 neimoidia_init_NAME: "Неймодианские кошельковые миры"
 neimoidia_init_DESC: "Начните с Неймодии; родной мир неймодианцев и центр неймодианских финансовых миров Катона, Деко и Кору, Неймодии."
 trade_federation_headquarters: "Штаб-квартира Торговой Федерации"
 trade_federation_headquarters_desc: "Немоидия и сами неймодианцы были важными основателями Торговой федерации, судоходного и торгового конгломерата галактического масштаба."
 fungus_farms: "Грибные фермы"
 fungus_farms_desc: "Неймодия является домом для обширных подземных сооружений, где добывают питательные грибы для неймодианцев."
 bridge_cities: "Неймодианский мост Города"
 bridge_cities_desc: "Сеть роскошных, позолоченных городов, висящих над поверхностью Катон-Неймодии, является центром неймодианской торговли и промышленности."
 neimoidian_palaces: "Неймодианские дворцы"
 neimoidian_palaces_desc: "Многие влиятельные неймодианцы, такие как Нут Ганрей и Лотт Дод, возвели большие роскошные дворцы и цитадели с массивными генераторами щитов и защитными сооружениями, которые служат для защиты их огромного богатства и активов даже от орбитальных атак."
 purse_world: "Мир кошельков"
 purse_world_desc: "Термин, используемый неймодианцами для описания мира-колонии, который имеет огромное значение и богатство для неймодианцев. Они также служат административными штабами своих собственных колоний."
 raxulon_city: "Раксулон-Сити"
 raxulon_city_desc: "Столица Раксуса Секундуса. Это разрастание городов является экономическим и административным центром планеты."
 carannia_city: "Город Карания"
 carannia_city_desc: "Столица Серенно. Этот город обеспечивает межзвездную торговлю на планете."
 droid_foundries: "Фабрика джеонозийских дроидов"
 droid_foundries_desc: "Расположенный под пустынной поверхностью Джеонозиса, этот объект способен построить тысячи боевых машин."
 geonosian_catacombs: "Джеонозийские катакомбы"
 geonosian_catacombs_desc: "под поверхностью Джеонозиса находится обширный лабиринт туннелей, где проживают миллиарды джеонозианцев."
 igbc_vault: "Главное хранилище IGBC"
 igbc_vault_desc: "Главное хранилище Межгалактического банковского клана хранит все финансовые записи и счета всей его клиентуры. Хранилище также является местом расположения Core Five, IGBC и руководящего органа Сципиона, состоящего из пяти финансовых магнатов."
 separatist_crash_site: "Место крушения сепаратистов"
 separatist_crash_site_desc: "Останки разбившегося корабля поддержки CIS DH-Omni. Этот корабль снабжения с тех пор был преобразован в сепаратистский оплот генерала дроидов Калани после окончания Войн клонов."
 techno_union_headquarters: "Штаб-квартира Техно Союза"
 techno_union_headquarters_desc: "Расположенный на родной планете Скакоа, Техносоюз продолжает расширять свою клиентуру и технологические достижения."
 high_pressure_zone: "Зона высокого давления"
 high_pressure_zone_desc: "Родной мир скакоанцев, Скако, имеет атмосферу с высоким давлением, которая требует адекватной защиты для всех, кто не является коренным жителем этой планеты."
 hypori_droid_factory: "Фабрика дроидов Хайпори"
 hypori_droid_factory_desc: "Хиддон на Хайпори, Техносоюз установил огромное количество строительных объектов и литейных заводов с единственной целью - производство армий дроидов."
 building_separatist_parliament: "Сепаратистский парламент"
 building_separatist_parliament_desc: "Сепаратистский Парламент на Раксусе является законодательной властью Альянса Сепаратистов."
 building_dooku_palace: "Дворец Дуку"
 building_dooku_palace_desc: "Этот дворец, расположенный на Серенно, является домом графа Дуку."
 building_geonosian_arena: "Арена Петранаки"
 building_geonosian_arena_desc: "Огромная арена, построенная джеонозийцами для развлечений и славы. Также служит подходящим способом избавиться от надоедливых сенаторов и их товарищей-джедаев."
 cis_command: "Командный центр СНГ"
 cis_command_desc: "Конфедерация независимых систем построила на территории горнодобывающего предприятия корпорации Клеггер секретный командный центр для Совета сепаратистов в качестве последнего оплота. На этом секретном объекте в горе также располагалась фабрика дроидов."
 cis_klegger_mining: "Клеггер Корп"
 cis_klegger_mining_desc: "Компания Klegger, принадлежащая Techno Union, управляет несколькими горнодобывающими предприятиями по всей планете."
 leader_trait_ruler_ge_emperor: "Императорский Трон"
 leader_trait_ruler_ge_emperor_desc: "Глава государства империи. Как пожелает Император, так и будет."
 tech_ge_imperial_army: "Имперские Вооруженные Силы"
 tech_ge_imperial_army_desc: "Военное подразделение Галактической Империи, отвечающее за проведение военных операций и поддержание порядка."
 tech_ge_imperial_vehicles: "Имперский арсенал техники"
 tech_ge_imperial_vehicles_desc: "Земляноходы, боевое оружие и тяжеловооруженные танки символизировали мощь и ресурсы Империи."
 tech_ge_dark_trooper_program: "Программа Темного Солдата"
 tech_ge_dark_trooper_program_desc: "Программа, разработанная генералом Ромом Мохком для разработки следующего поколения штурмовиков в виде бронированных и улучшенных боевых дроидов. Эта программа робототехники реализовала несколько этапов Темного солдата, начиная от кибернетических аугментаций и заканчивая управляемыми дроидами экзокостюмами, изготовленными из уникального и почти неразрушимого сплава, известного как фрик."
 tech_ge_imperial_royal_guard: "Королевская гвардия Императора"
 tech_ge_imperial_royal_guard_desc: "Элитный полк почетного караула на службе императора."
 tech_ge_imperial_intelligence: "Имперская разведка"
 tech_ge_imperial_intelligence_desc: "Разведывательное подразделение Галактической Империи, занимающееся сбором секретной и иной информации для имперского правительства."
 tech_ge_imperial_emperor_hand: "Рука Императора"
 tech_ge_imperial_emperor_hand_desc: "Известная как Рука Императора, это была элитная секта секретных агентов, действовавшая в Империи и подотчетная только Императору. Эти агенты отправляются по всей галактике для проведения секретных операций, включая сбор разведданных, убийства и подавление восстаний."
 tech_ge_imperial_inquisition: "Имперская инквизиция"
 tech_ge_imperial_inquisition_desc: "Секретное подразделение Имперской разведки, состоящее из чувствительных к Силе агентов тёмной стороны, известных как Инквизиторы, которым поручено совершать убийства и устранять пользователей силы."
 imperial_stormtroopers: "Легион штурмовиков"
 imperial_stormtroopers_desc: "Основные наземные солдаты Империи, облаченные в белый пластоидно-композитный бронежилет, эти солдаты оснащены бластерами Е-11, и их лучше всего использовать в больших количествах для подавления врага."
 imperial_stormtrooper_garrison: "Гарнизон штурмовиков"
 imperial_stormtrooper_garrison_desc: "Оборонительный гарнизон штурмовиков."
 imperial_501_stormtrooper_legion: "501-й легион штурмовиков"
 imperial_501_stormtrooper_legion_desc: "Элитный легион штурмовиков, печально известный как «Кулак Вейдера», считается одним из самых эффективных и закаленных в боях легионов штурмовиков в составе корпуса штурмовиков."
 imperial_storm_commandos: "Штурмовые коммандос"
 imperial_storm_commandos_desc: "Элитное подразделение специального назначения, состоящее из хорошо обученных и безжалостных штурмовиков-коммандос, которым поручено проводить тайные операции и диверсии, используя грубую силу. Защищен усиленной черной броней разведчика и вооружен бластерной винтовкой E-11 и полевыми дезинтеграторами Evasive-226-R для поражения экранированных целей."
 imperial_phase_1_darktroopers: "Темные солдаты фазы I"
 imperial_phase_1_darktroopers_desc: "Первая модель темного солдата в виде скелета, оснащенного вибромечом и взрывозащитным щитом, используемая для защиты объектов и в качестве охранника."
 imperial_phase_2_darktroopers: "Тёмные солдаты фазы II"
 imperial_phase_2_darktroopers_desc: "Тяжелобронированные и вооруженные боевые дроиды из программы темных солдат, оснащенные прыжковыми ранцами и вооруженные штурмовой плазменной пушкой, способной уничтожить несколько вражеских целей."
 imperial_phase_3_darktroopers: "Тёмные солдаты фазы III"
 imperial_phase_3_darktroopers_desc: "Последний тяжелобронированный и вооруженный боевой дроид/экзокостюм из программы темных солдат, оснащенный разнообразным встроенным штурмовым вооружением, ракетами самонаведения и наручными бластерами. Эти двуногие танки также вооружены большой плазменной штурмовой пушкой, способной пробивать бронированные танки, и оснащены прыжковыми ранцами для дополнительной мобильности."
 imperial_royal_guard: "Имперская Королевская Гвардия"
 imperial_royal_guard_desc: "Элитные почетные гвардейцы в малиновых доспехах, лично отобранные для службы нынешнему Императору. Эти элитные подразделения хорошо обучены как рукопашному, так и дальнему бою, представляя собой жестокую боевую силу, подотчетную только Императору."
 imperial_royal_guard_limit_tooltip: "Ограничение в 12 королевских гвардейцев."
 imperial_royal_guard_count: "Граф Имперской Королевской Гвардии"
 imperial_sovereign_protectors: "Имперские Суверенные Защитники"
 imperial_sovereign_protectors_desc: "Элитный почетный караул, облаченный в малиновые и черные одежды, на службе нынешнего Императора. Этот вариант отобран непосредственно из Королевской гвардии Императора, являющейся чемпионами в бою и смертоносности."
 imperial_inquisitors: "Имперские инквизиторы"
 imperial_inquisitors_desc: "Темная сторона Чувствительные к Силе агенты Имперского Инквизитория, которым поручено уничтожение пользователей силы. Инквизиторы — это высококвалифицированные и могущественные люди, часто превосходящие по рангу меньших темных джедаев."
 imperial_tie_maulers: "TIE ap-1 Громовержцы"
 imperial_tie_maulers_desc: "Легкие имперские штурмовые машины, используемые в качестве быстрых и одноразовых боевых машин для борьбы с пехотой. Вооружен тройной средней бластерной пушкой."
 imperial_2m_saber_tanks: "2-М Репульсорные танки класса «Сабля»"
 imperial_2m_saber_tanks_desc: "Средние репульсорные танки, оснащенные дефлекторным щитом и вооруженные средней спаренной лазерной турелью, двумя тяжелыми лазерными пушками и двумя ракетными пусковыми установками."
 imperial_spmat_artillery: "Артиллерийские шагоходы СПМА-Т"
 imperial_spmat_artillery_desc: "Самоходные средние артиллерийские шагоходы, вооруженные мощной тяжелой турболазерной пушкой и противопехотными бластерами."
 imperial_atpt_walkers: "Ходунки AT-PT"
 imperial_atpt_walkers_desc: "Вездеходный персональный транспорт, служащий легким противопехотным шагоходом, вооруженный парой спаренных бластерных пушек и гранатометом сотрясения."
 imperial_atst_walkers: "Ходунки AT-ST"
 imperial_atst_walkers_desc: "All Terrain Scout Transports — это легкие разведывательные шагоходы, которые также служат тяжеловооруженными наземными боевыми машинами, вооруженными спаренной бластерной пушкой, набором пусковых установок для ударных ракет и скорострельными пушками для борьбы с пехотой."
 imperial_atat_walker: "Ходунки AT-AT"
 imperial_atat_walker_desc: "All Terrain Armored Transports — это большие тяжелобронированные четвероногие боевые шагоходы, вооруженные установленными на подбородке сдвоенными тяжелыми лазерными пушками и двумя средними бластерными пушками."
 imperial_juggernaut_tank: "Турботанки HCVw A9"
 imperial_juggernaut_tank_desc: "Тяжелобронированная колесная боевая машина и транспорт, вооруженная скорострельными ротационными лазерными пушками, установленными в верхней башне, и двумя передними спаренными тяжелыми многозарядными бластерами, служащими боевой машиной пехоты."
 imperial_firehawke_tanks: "Тяжелые репульсорные танки S-1 FireHawke"
 imperial_firehawke_tanks_desc: "Тяжелый репульсорный танк с вооружением, аналогичным имперскому шагоходу AT-AT, но с повышенной маневренностью."
 imperial_tie_fighters: "Эскадрилья СИД-истребителей"
 imperial_tie_fighters_desc: "Крыло одноразовых TIE-истребителей, вооруженных одной парой лазерных пушек, которые лучше всего использовать для защиты и перехвата самолетов противника."
 imperial_tie_strikers: "Ударная эскадрилья TIE"
 imperial_tie_strikers_desc: "Крыло специализированных атмосферных TIE-истребителей, вооруженных мощными лазерными пушками и протонными бомбами и служащих специализированными истребителями-бомбардировщиками."
 imperial_tie_bombers: "Эскадрилья СИД-бомбардировщиков"
 imperial_tie_bombers_desc: "Крыло одноразовых TIE-бомбардировщиков, вооруженных разнообразными протонными бомбами и торпедами для нанесения массивного сопутствующего ущерба и уничтожения хорошо защищенных целей."
 name_list_imperial: "Галактическая Империя"
 trait_imperial: "Империалист"
 trait_imperial_desc: "Амбициозный, высокомерный и безжалостный. Имперцы — патриоты порядка, безопасности и верности государству."
 gov_galactic_empire: "Тоталитарные империалисты"
 gov_galactic_empire_desc: "Галактическая Империя — авторитарная конституционная монархия, в которой Император обладает абсолютной властью."
 RT_GALACTIC_EMPEROR: "Галактический Император"
 RT_GALACTIC_EMPRESS: "Галактическая Императрица"
 HT_SUPREME_COMMANDER: "Верховный главнокомандующий"
 HT_SUPREME_COMMANDER_FEMALE: "Верховный главнокомандующий"
 civic_galactic_emperor: "Галактический Император"
 civic_galactic_emperor_desc: "Высшая власть в Империи, эта должность изначально была получена из Канцелярии Верховного Канцлера. Учитывая абсолютную власть и полномочия управлять, титул Галактического Императора имеет последнее слово в любых вопросах государства и закона. Кроме того, это существо тайно является могущественным пользователем силы тёмной стороны огромной силы. Разлагающее влияние Императора способствовало созданию общества, состоящего из извращенных подхалимов и предателей внутри правительства. Выбор этого гражданского общества добавит черту §YChosen One§! к вашему начальному правителю."
 civic_imperial_ruling_council: "Имперский Правящий Совет"
 civic_imperial_ruling_council_desc: "Совет советников и государственных деятелей, верных Императору. Каждый член совета обладает значительной властью над правительством и армией. Однако безудержная жадность, амбиции и постоянная борьба за власть держат многих ее членов в состоянии постоянной паранойи и соперничества."
 civic_imperial_military: "Имперские военные"
 civic_imperial_military_desc: "Военно-промышленный комплекс беспрецедентного масштаба. Эта военная доктрина фокусируется на укреплении вооруженных сил посредством страха перед превосходящей силой. Выбор этого гражданского устройства откроет технологию §YЦентрализованное командование§! и §YМежзвездные традиции флота§!. §YОткрывает специальные имперские армии, зависящие от текущего режима.§!"
 civic_tarkin_doctrine: "Доктрина Таркина"
 civic_tarkin_doctrine_desc: "Также известная как Доктрина террора, это концепция, разработанная гранд-моффом Уилхаффом Таркином, которая стремилась обеспечить имперское владычество посредством территориальной консолидации, быстрой связи и правила страха. Эта доктрина направлена ​​на снижение риска пиратства, усиление правоприменения/стабильности и ускорение исследований в области оружия."
 councilor_imperial_supreme_commander: "Верховный главнокомандующий"
 councilor_imperial_supreme_commander_female: "Верховный главнокомандующий"
 councilor_imperial_supreme_commander_desc: "$TITLE$ обладает высшим контролем над вооруженными силами и считается вторым по величине должностным лицом, которое служит и подчиняется непосредственно Императору."
 councilor_imperial_grand_vizier: "Великий Визирь"
 councilor_imperial_grand_vizier_female: "Великий Визирь"
 councilor_imperial_grand_vizier_desc: "$TITLE$ — нынешний глава Имперского правящего совета, который консультирует Императора."
 councilor_imperial_grand_admiral: "Гранд-адмирал"
 councilor_imperial_grand_admiral_female: "Гранд-адмирал"
 councilor_imperial_grand_admiral_desc: "$TITLE$ — это высшее военно-морское звание, используемое Имперской армадой, назначаемое лично Императором, которое превосходит по званию всех других политических и военных служащих."
 councilor_imperial_grand_moff: "Гранд Мофф"
 councilor_imperial_grand_moff_female: "Гранд Мофф"
 councilor_imperial_grand_moff_desc: "$TITLE$ — это высокий политический и военный титул, присваиваемый региональным губернаторам сверхсекторов империи."
 imperial: "Имперский"
 imperial_desc: "Граждане Империи."
 imperial_adj: "Имперский"
 imperial_plural: "Имперские единицы"
 imperial_insult_01: "Имперский отброс"
 imperial_insult_plural: "Ковшовые головки"
 imperial_compliment_01: "Ваше Императорское Величество"
 imperial_compliment_plural_01: "Имперские защитники"
 imperial_spawn: "Кадет"
 imperial_spawn_plural: "Кадеты"
 imperial_sound_01: "рычит"
 imperial_sound_02: "хрюкает"
 imperial_sound_03: "тявкает"
 imperial_sound_04: "вой"
 imperial_sound_05: "мяуканье"
 imperial_organ: "желудок"
 imperial_mouth: "рот"
 imperialcenter_init_NAME: "Имперский Центр (+)"
 imperialcenter_init_DESC: "Старт в системе Корусанта; столица Галактической Империи во время Галактической гражданской войны. В эту систему также входят системы Аксум, Бисс и Куат."
 imperialcenterlite_init_NAME: "Имперский Центр"
 imperialcenterlite_init_DESC: "Старт в системе Корусант; столица Галактической Империи."
 deep_core_init_NAME: "Глубокое ядро"
 deep_core_init_DESC: "Запуск в системе Бешкек; секретная столица Галактической Империи и Тёмной Империи."
 mustafar_system_NAME: "Система Мустафар"
 mustafar_system_DESC: "Запускаем в системе Мустафар; вулканическая шахтерская планета и личная резиденция Дарта Вейдера."
 kessel_system_NAME: "Кессель и Утроба"
 kessel_system_DESC: "Старт в системе Кесселя; Шахтерский мир в непосредственной близости от скопления Утробы, скопления черных дыр и местоположения секретной исследовательской установки Империи."
 imperial_high_command: "Имперское Верховное Командование"
 imperial_high_command_desc: "Имперское Верховное командование, штаб-квартира которого находится на Корусанте, является военным центром управления Империей."
 coronet_city: "Коронет-Сити"
 coronet_city_desc: "Коронет-Сити — гордая столица Кореллии. Это технологически развитый мегаполис и центр торговли."
 corellian_engineering_corporation: "Кореллианская инженерная корпорация"
 corellian_engineering_corporation_desc: "Один из крупнейших производителей звездолетов в галактике, CEC — крупная компания, специализирующаяся на судостроении."
 emperor_citadel: "Тронный мир"
 emperor_citadel_desc: "Расположенный в секретной столице и мире-крепости Бисс, этот город считается личным убежищем Императора. Хотя Бисс считается райским миром для ничего не подозревающих путешественников, массивная башня Цитадели в центре города стала связующим звеном тёмной стороны, которая медленно промывает мозги и истощает население этой планеты."
 klegger_mining: "Менсикс Майнинг Компани"
 klegger_mining_desc: "После окончания Войн клонов Klegger Corp, горнодобывающая компания, принадлежащая Техносоюзу на Мустафаре, обанкротилась после того, как два пользователя Силы вступили в жестокую дуэль, которая привела к разрушению всего их горнодобывающего предприятия. Mensix Corporation, еще одна горнодобывающая компания, быстро взяла на себя основные операции по добыче полезных ископаемых на поверхности Мустафара."
 water_world: "Водный мир"
 water_world_desc: "Теневой мир Нура большей частью покрыт океанами."
 kessel_facilities: "Пряные рудники Кесселя"
 kessel_facilities_desc: "Кессель — крупнейший центр добычи пряностей, прибыльного наркотика, часто используемого во многих незаконных действиях. Эта деформированная планета также была исправительной колонией."
 maw_research_center: "Исследовательский центр Утробы"
 maw_research_center_desc: "Установка «Утроба» — это строго засекреченный центр исследования оружия, основанный гранд-моффом Уилхаффом Таркином для создания супероружия. Он был построен из астероидов посреди скопления Утроба, скопления черных дыр, из-за которых транзит в этом регионе практически невозможен."
 imperial_security_complex: "Имперский охранный комплекс"
 imperial_security_complex_desc: "Крупный научно-исследовательский комплекс на планете Скариф, в котором размещались центральные исследовательские, структурные, военные и производственные центры Империи для проекта «Звездная пыль»."
 scarif_paradise: "Тропический рай"
 scarif_paradise_desc: "Из-за природной красоты мира многие офицеры, дислоцированные на Скарифе, рассматривали его как место «неофициального выхода на пенсию», где они могли пренебречь своими обязанностями под теплым солнцем."
 scarif_init_NAME: "Система Скариф"
 scarif_init_DESC: "Запускаем в системе Скариф; центральный имперский исследовательский комплекс проекта «Звездная пыль»."
 shield_gate: "Щитовые ворота"
 shield_gate_desc: "Орбитальная конструкция над планетарным щитом на Скарифе, позволяющая выйти на поверхность."
 tb_senate_building: "Ротонда Императорского Сената"
 tb_senate_building_desc: "Сенатская Ротонда служит местом расположения Императорского Сената."
 tb_cthon: "Ктон"
 tb_cthon_desc: "Дикие каннибалы, преследующие самые глубокие нижние уровни. Уничтожение этой заразы было бы более выполнимой задачей, если бы не бесконечно запутанная местность."
 building_imperialpalace: "Императорский дворец"
 building_imperialpalace_desc: "Массивное сооружение, в котором размещаются высшие должностные лица правительства и Императорский тронный зал."
 building_emperor_citadel: "Цитадель Императора"
 building_emperor_citadel_desc: "Возвышающаяся над тронным городом Бисс огромная черно-красная башня — это личная цитадель и центр власти Императора. Эта цитадель предоставляет Императору его личный тронный зал, офисы, гарнизон и библиотеку артефактов тёмной стороны, используемых для подчинения планеты и ее населения воле Императора."
 building_fortress_vader: "Крепость Вейдера"
 building_fortress_vader_desc: "Эта крепость, построенная для лорда ситхов Дарта Вейдера, представляет собой крепость, построенную на месте старого Храма ситхов. Сам храм напрямую связан с темной стороной этой планеты, расширяя исследования тёмной стороны (псионики)."
 building_fortress_inquisitorius: "Крепость Инквизиторий"
 building_fortress_inquisitorius_desc: "Подводная крепость, расположенная на луне Нур и служившая штаб-квартирой Имперской программы инквизиторов."
 FLAG_CATEGORY_Imperial: "Галактическая Империя"
 pc_mustafar: "Вулканическая пустошь"
 pc_mustafar_desc: "Неустойчивый мир расплавленной лавы и пепла."
 pc_nur: "Водный мир"
 pc_nur_desc: "Океанический мир без видимой суши на поверхности."
 kuat_init_NAME: "Система Куат"
 kuat_init_DESC: "Старт в системе Куат; известные верфи Верфи Куата. Эта стартовая система откроет мегаструктуру орбитального кольца Куата, которая предоставит дополнительные верфи и увеличит скорость строительства кораблей."
 GAL_EMPIRE_STORMTROOPERS_ORD: "$O$ Имперский легион штурмовиков"
 GAL_EMPIRE_STORMTROOPERS_DEFENSE_ORD: "$O$ Имперский гарнизон штурмовиков"
