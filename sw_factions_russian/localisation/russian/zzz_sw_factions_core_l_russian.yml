 kraytcoruscant_init_NAME: "Крайт Имперский Центр"
 kraytcoruscant_init_DESC: "Старт в системе Корусанта; столица Галактической Империи Дарта Крайта в эпоху Наследия. После Юужань-вонгской войны орбита и спутники планеты были изменены."
 queen_of_the_core: "Королева Ядра"
 queen_of_the_core_desc: "Расположенный на пересечении многочисленных гипермаршрутов, Корусант с населением, оцениваемым в 3 триллиона человек, является одной из самых влиятельных планет в Галактике."
 krayt_imperial_headquarters_coruscant: "Имперский штаб"
 krayt_imperial_headquarters_coruscant_desc: "Имперское верховное командование — оперативный центр империи, расположенный сейчас на Корусанте."
 centax_infrastructure: "Инфраструктура Сентакс"
 centax_infrastructure_desc: "Хотя центаксовские спутники Корусанта по своей природе бесплодны, тысячи лет развития создали обширное множество обитаемых структур и горнодобывающих предприятий."
 centax_correctional: "Пенитенциарный мир"
 centax_correctional_desc: "Тихие шахты исправительной колонии особого типа «Центакс-1» — убежище, отведенное для злосчастных Корусанта."
 coruscant_underworld: "Подземный мир Корусанта"
 coruscant_underworld_desc: "Подземный мир Корусанта расположен в километре под массивными небоскребами на поверхности. Чем ниже уровень, тем более опасным и криминальным он становится."
 rings_of_coruscant: "Кольца Корусанта"
 rings_of_coruscant_desc: "Искусственно созданное планетарное кольцо, служащее напоминанием о Юужань-вонгской войне. Кольца также являются популярной туристической достопримечательностью."
 duros_shipyards: "Верфи и орбитальные города Дуро Старшипрайт"
 duros_shipyards_desc: "Из-за нынешнего загрязнения поверхности Дуро большая часть населения мигрировала в орбитальные города, в которых проживает большая часть населения. Орбитальные платформы также являются домом для множества верфей вокруг Дуро."
 duros_imperial_academy: "Имперская Академия"
 duros_imperial_academy_desc: "После Юужань-вонгской войны планета Дуро была восстановлена в своем первоначальном биоме благодаря использованию технологии терраформирования вонгов после столетий загрязнения, радиации и войны. В конце концов Империя основала здесь Имперскую Академию для обучения новобранцев под руководством талантливого Дуроса."
 sienar_research_division: "Отдел перспективных исследований Сиенара"
 sienar_research_division_desc: "Эта обширная установка, расположенная к северу от столицы Корулага, занимается проектированием, созданием и тестированием новых технологий и секретных прототипов. Объект хорошо охраняется, но некоторые жители все еще могут время от времени видеть странного вида звездные истребители, вылетающие из объекта."
 corulag_universities: "Академии Корулага"
 corulag_universities_desc: "Корулаг, широко известный как передовой центр образования в центральных мирах, является домом для ряда престижных университетов, от гражданских до военных. Этот образовательный центр привлек для обучения здесь лучшие и ярчайшие умы галактики."
 anaxes_citadel: "Военно-морское училище Анаксиса"
 anaxes_citadel_desc: "Престижная военная академия, воплощающая давние военно-морские традиции. Обученные здесь адмиралы более способны к морскому бою."
 axum_industry: "Аксум Индастриз"
 axum_industry_desc: "Аксум считается крупным индустриальным миром по сравнению с его сестринской планетой Анаксес."
 defender_of_the_core: "Защитник Ядра"
 defender_of_the_core_desc: "Система Аксум имеет славную военную историю, будучи первой и последней линией обороны Республики, а теперь и Империи. Граждане Аксума полны решимости продолжать в том же духе."
 kuat_shipyards: "Верфи Куата"
 kuat_shipyards_desc: "Этот обширный орбитальный комплекс соединенных между собой верфей, сухих доков и космических станций служит основным строительным центром верфей Куата."
 kuat_drive_yards: "Куат Драйв Верфь"
 kuat_drive_yards_desc: "Один из самых известных центров судостроения в галактике, Верфи Куата — известная судостроительная компания, основанная группой, известной как Десятка, несколькими богатыми аристократическими семьями Куати, которые основали компанию во время образования Галактической Республики."
 kraytsith_academy: "Единая Академия Ситхов"
 kraytsith_academy_desc: "Древний объект, который наблюдал за обучением лордов ситхов со времен старой Империи ситхов, теперь используемый Едиными ситхами для той же цели."
 kraytvalley_of_the_dark_lords: "Долина Темных Лордов"
 kraytvalley_of_the_dark_lords_desc: "Огромный некрополь, в котором находятся гробницы древних лордов ситхов, живших в далеком прошлом. Центр темных знаний, искушений и силы."
 building_kraytimperialpalacec: "Императорский дворец Корусанта"
 building_kraytimperialpalacec_desc: "Массивное возвышающееся сооружение, в котором размещается высшее руководство Империи и новый Имперский тронный зал на Корусанте."
 building_templeofthesith: "Храм Ситхов"
 building_templeofthesith_desc: "Построенный на территории нового Храма джедаев на Корусанте, Единые ситхи отремонтировали храм, чтобы он стал учебной академией для новых помощников ситхов."
 kuat_ring: "Орбитальное кольцо"
 kuat_ring_DESC: "Кольцо‑завод: искусственный круг вокруг планеты, служащий крупной верфью."
 kuat_ring_2: "Орбитальное кольцо"
 kuat_ring_2_DESC: "Искусственное кольцо вокруг планеты. Расширение оригинального кольца увеличивает возможности верфи."
 kuat_ring_MEGASTRUCTURE_DETAILS: "Постройте Орбитальное кольцо — искусственное сооружение вокруг планеты, создающее крупную верфью."
 kuat_ring_deactivated: "Деактивированный орбитальный массив"
 kuat_ring_deactivated_DESC: "Искусственное кольцо вокруг планеты, функционирующее как крупная верфь. Ожидает активации..."
 kuat_ring_activated: "Орбитальный массив"
 kuat_ring_activated_DESC: "Искусственное кольцо вокруг планеты, служащее крупной верфью. Полностью активировано."
 kuat_ring_activated_2: "Орбитальный массив"
 kuat_ring_activated_2_DESC: "Искусственное кольцо вокруг планеты. Расширение оригинального кольца увеличивает возможности верфи."
 pc_kuat_ring: "Орбитальный массив"
 pc_kuat_ring_desc: "Массив орбитальной верфи Jaemus"
 pc_coruscant_tile: "Галактический город"
 pc_coruscant_tile_desc: "Бесконечные просторы во всех направлениях предоставляют жильё всем известным видам."
 pc_coruscant: "Капитал‑планета"
 pc_coruscant_desc: "Эта планета‑город служит столицей для множества разумных существ галактики."
 coruscant: "Капитал‑планета"
 coruscant_desc: "Эта планета‑город служит столицей для множества разумных существ галактики."
 pc_centax_tile: "Подземное сооружение"
 pc_centax_tile_desc: "Поверхность планеты может быть стерильной, но в подземных туннелях живёт жизнь."
 pc_centax: "Пустынный мир"
 pc_centax_desc: "Бесплодный и каменистый мир с тонкой или несуществующей атмосферой. Поверхность покрыта метеоритными кратерами и полностью лишена жизни."
 centax: "Бесплодный мир"
 centax_desc: "Бесплодный и каменистый мир с тонкой или несуществующей атмосферой. Поверхность покрыта метеоритными кратерами и полностью лишена жизни."
