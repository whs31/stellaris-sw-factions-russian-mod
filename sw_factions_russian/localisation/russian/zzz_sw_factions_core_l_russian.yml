 councilor_sith_empire_emperor_voice: "Голос Императора"
 councilor_sith_empire_emperor_voice_female: "Голос Императора"
 councilor_sith_empire_emperor_voice_desc: "$TITLE$ — это уникальная должность, которую занимает личный советник Императора ситхов или, в некоторых случаях, тело-носитель, способное удаленно передавать команды своим слугам. Голос Императора олицетворяет полный страх и власть Императора ситхов."
 councilor_sith_empire_emperor_wrath: "Гнев Императора"
 councilor_sith_empire_emperor_wrath_female: "Гнев Императора"
 councilor_sith_empire_emperor_wrath_desc: "$TITLE$ — это должность, созданная для того, чтобы служить личным исполнителем и палачом Императора ситхов, получая приказы непосредственно от императора и подчиняясь только ему."
 councilor_sith_empire_emperor_hand: "Рука Императора ситхов"
 councilor_sith_empire_emperor_hand_female: "Рука Императора ситхов"
 councilor_sith_empire_emperor_hand_desc: "$TITLE$ — это секретная должность, занимаемая членами организации тёмной стороны, которая служит воле Императора ситхов, действуя автономно в шпионаже, убийствах и распространении влияния Императора ситхов по всей империи."
 councilor_sith_empire_intelligence_keeper: "Министр ситхской разведки"
 councilor_sith_empire_intelligence_keeper_female: "Министр ситхской разведки"
 councilor_sith_empire_intelligence_keeper_desc: "$TITLE$ — это высшая руководящая должность в Имперской/Ситхской разведке, отвечающая за распределение и контроль шпионских операций в Министерстве разведки Империи ситхов."
 councilor_sith_empire_minister_of_war: "Военный министр"
 councilor_sith_empire_minister_of_war_female: "Военный министр"
 councilor_sith_empire_minister_of_war_desc: "Звание $TITLE$ — престижное звание в Военном Министерстве, присваиваемое высокопоставленным имперцам для наблюдения за всеми военными операциями по усмотрению Темного Совета."
 councilor_sith_empire_defender_of_the_empire: "Защитник Империи"
 councilor_sith_empire_defender_of_the_empire_female: "Защитник Империи"
 councilor_sith_empire_defender_of_the_empire_desc: "$TITLE$ — это должность руководства ситхов в Сфере защиты Империи Тёмного совета, отвечающая за надзор за военными делами и полное сохранение Империи ситхов. Эта должность также является фактическим лидером Темного Совета во время кризиса."
 councilor_sith_councilor: "Тёмный советник"
 councilor_sith_councilor_female: "Тёмный советник"
 councilor_sith_councilor_desc: "$TITLE$ — это влиятельная должность в Ордене ситхов, предоставляемая военачальникам ситхов, которые служат близкими советниками выдающегося Темного лорда ситхов или Императора ситхов."
 councilor_star_forge_commander: "Командир Звёздной кузницы"
 councilor_star_forge_commander_female: "Командир Звёздной кузницы"
 councilor_star_forge_commander_desc: "$TITLE$ — это должность, предоставляемая высокопоставленным военным чиновникам, которым поручено контролировать и поддерживать оперативную эффективность Звёздной кузницы на службе своих хозяев."
 councilor_mandalorian_clan_leader: "Вождь клана"
 councilor_mandalorian_clan_leader_female: "Вождь клана"
 councilor_mandalorian_clan_leader_desc: "$TITLE$ — это высшая политическая должность во многих разнообразных, но разрозненных мандалорских кланах, представляющая каждый из своих домов."
 councilor_mandalorian_clan_nauralor: "Клан Наур'алор"
 councilor_mandalorian_clan_nauralor_female: "Клан Наур'алор"
 councilor_mandalorian_clan_nauralor_desc: "$TITLE$ — это особая должность в мандалорском обществе, которая служит клановым оружейником и кузнецом бескарского железа для любых военных действий мандалорцев."
 councilor_mandalorian_field_marshal: "Фельдмаршал клана"
 councilor_mandalorian_field_marshal_female: "Фельдмаршал клана"
 councilor_mandalorian_field_marshal_desc: "$TITLE$ — это военная должность в мандалорских кланах и третий ранг в движении неокрестоносцев. Фельдмаршалы обычно служат полевыми советниками и наблюдателями за военными операциями на целых секторах и были более чем готовы возглавить войска на линии фронта, если это было сочтено необходимым для расширения кланов."
 councilor_republic_sis_director: "Директор СИС"
 councilor_republic_sis_director_female: "Директор СИС"
 councilor_republic_sis_director_desc: "$TITLE$ — секретная должность в Республиканской стратегической информационной службе, предназначенная для надзора за шпионажем и разведывательными операциями, как внутри страны, так и за ее пределами."
 councilor_republic_supreme_commander: "Верховный главнокомандующий Республики"
 councilor_republic_supreme_commander_female: "Верховный главнокомандующий Республики"
 councilor_republic_supreme_commander_desc: "Звание $TITLE$ — это должность, занимаемая высшим офицером и главой республиканских вооруженных сил, способным организовывать секторные флоты и армии для крупных кампаний."
 councilor_republic_vice_chair: "Заместитель Председателя Сената"
 councilor_republic_vice_chair_female: "Заместитель Председателя Сената"
 councilor_republic_vice_chair_desc: "$TITLE$ — это должность, которая помогала Верховному канцлеру управлять Галактическим Сенатом."
 councilor_republic_clone_marshal_commander: "Маршал-коммандер-клон"
 councilor_republic_clone_marshal_commander_female: "Маршал-коммандер-клон"
 councilor_republic_clone_marshal_commander_desc: "$TITLE$ — высокопоставленный командир солдат-клонов, отвечающий за командование формированиями корпусного уровня в Армии клонов."
 councilor_jedi_order_master: "Магистр Ордена"
 councilor_jedi_order_master_female: "Магистр Ордена"
 councilor_jedi_order_master_desc: "$TITLE$ — должность джедая, избранного руководителем Высшего совета джедаев."
 councilor_jedi_caretaker_of_first_knowledge: "Хранитель первых знаний"
 councilor_jedi_caretaker_of_first_knowledge_female: "Хранитель первых знаний"
 councilor_jedi_caretaker_of_first_knowledge_desc: "$TITLE$ — это должность в Ордене джедаев, которая осуществляет прямой надзор за Архивами джедаев и хранилищами голокронов, выступая в качестве архивариусов и хранителей знаний джедаев."
 councilor_rebel_alliance_cabinet: "Секретарь кабинета Альянса"
 councilor_rebel_alliance_cabinet_female: "Секретарь кабинета Альянса"
 councilor_rebel_alliance_cabinet_desc: "$TITLE$ — это должность, которая руководила Кабинетом Альянса, который управлял гражданским органом Альянса за восстановление Республики, включающим вопросы финансов, промышленности, образования, государства, снабжения и войны."
 councilor_rebel_supreme_commander: "Верховный главнокомандующий союзников"
 councilor_rebel_supreme_commander_female: "Верховный главнокомандующий Союзников"
 councilor_rebel_supreme_commander_desc: "$TITLE$ — это должность в совете верховных главнокомандующих союзных войск, отвечающая за руководство Альянсом в военных вопросах, включая флот, OaS, StarCom, Support, Intell, SepcForces и SecCom."
 councilor_new_republic_supreme_commander: "Верховный главнокомандующий Новой Республики"
 councilor_new_republic_supreme_commander_female: "Верховный главнокомандующий Новой Республики"
 councilor_new_republic_supreme_commander_desc: "$TITLE$ — это должность в вооруженных силах Новой Республики, которая реформировала и объединила многие независимые союзные командования в StarCom, OaS и Support, чтобы уменьшить дублирование юрисдикций и повысить оперативный контроль и эффективность."
 councilor_new_republic_ruling_councilor: "Правящий советник Новой Республики"
 councilor_new_republic_ruling_councilor_female: "Правящий советник Новой Республики"
 councilor_new_republic_ruling_councilor_desc: "$TITLE$ — старший представитель руководящего органа Новой Республики, состоящий из главы государства и тщательно отобранных сенаторов, которые возглавляли каждый из шести подкомитетов Сената."
 councilor_new_jedi_order_master: "Магистр Ордена"
 councilor_new_jedi_order_master_female: "Магистр Ордена"
 councilor_new_jedi_order_master_desc: "$TITLE$ — должность джедая, избранного руководителем Высшего совета джедаев, восстановленного и реформированного гроссмейстером Люком Скайуокером."
 councilor_cis_supreme_commander: "Верховный главнокомандующий армий дроидов"
 councilor_cis_supreme_commander_female: "Верховный главнокомандующий армий дроидов"
 councilor_cis_supreme_commander_desc: "$TITLE$ вручается военному командиру, отвечающему за командование огромными механическими силами Сепаратистской армии дроидов."
 councilor_cis_congress_leader: "Лидер Конгресса Сепаратистов"
 councilor_cis_congress_leader_female: "Лидер Конгресса Сепаратистов"
 councilor_cis_congress_leader_desc: "$TITLE$ — это должность исполняющего обязанности председателя сепаратистского парламента, которая представляет интересы сенаторов, придерживающихся сепаратистской ориентации."
 councilor_cis_council_representative: "Член Исполнительного совета"
 councilor_cis_council_representative_female: "Член Исполнительного совета"
 councilor_cis_council_representative_desc: "$TITLE$ — это должность, которая служит представителем Исполнительного сепаратистского совета и интересов различных крупных держав и корпораций, поддерживающих дело сепаратистов."
 councilor_fo_allegiant_general: "Верный генерал"
 councilor_fo_allegiant_general_female: "Верный генерал"
 councilor_fo_allegiant_general_desc: "$TITLE$ — это высокопоставленная должность в Вооруженных Силах Первого Ордена, обладающая полномочиями командовать наземными и космическими силами. Задача этой должности также состоит в том, чтобы прививать лояльность среди военных и поддерживать основную неоимперскую идеологию Первого Ордена и тайную высшую власть ситхов."
 councilor_fo_arch_mage: "Архимаг"
 councilor_fo_arch_mage_female: "Архимаг"
 councilor_fo_arch_mage_desc: "$TITLE$ — это руководящая должность в Послушниках Культа Ситхов Запредельного мира, которой поручено прочесывать галактику в целях сбора древних артефактов ситхов, одновременно распространяя идеологию ситхов путем проведения ритуалов и жертвоприношений своим хозяевам-ситхам."
 gov_old_republic: "Однопалатная Республика"
 gov_old_republic_desc: "Давнее федеральное демократическое правительство, действующее уже более 25 000 лет. Правители избираются Галактическим Сенатом на четырехлетний срок в качестве Верховного канцлера."
 tech_old_republic_army: "Республиканская военная реформа"
 tech_old_republic_army_desc: "В прошлом вооруженные силы Республики представляли собой разрозненное собрание флотов и солдат со всей галактики, где каждый мир-член вносил свой вклад в общее дело. Однако после нескольких крупных войн с ситхами республика восстановила свои силы, стремясь способствовать единству и духу товарищества, одновременно стандартизируя большую часть своего оборудования и военной иерархии. В результате Республика может призвать к участию огромное количество миров, объединяя множество разнообразных инженеров, специалистов и солдат в более сплоченную и боеспособную силу."
 oldrepublic: "Гражданин Республики"
 oldrepublic_desc: "Граждане Республики."
