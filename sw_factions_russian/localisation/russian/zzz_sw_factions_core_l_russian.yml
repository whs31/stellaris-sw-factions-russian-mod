 gov_rebel_alliance: "Движение Сопротивления"
 gov_rebel_alliance_desc: "Свободная конфедерация, состоящая из нескольких планетарных систем, секторов и фракций, служащих общему делу."
 gov_new_republic: "Парламентская Республика"
 gov_new_republic_desc: "Добровольная конфедерация и парламентская федеративная республика, организованная на демократических принципах, воплощающая идеалы мира, справедливости и свободы."
 RT_CHIEF_OF_STATE: "Глава государства"
 RT_CHIEF_OF_STATE_FEMALE: "Глава государства"
 civic_new_light_side: "Новый Орден джедаев"
 civic_new_light_side_desc: "Эмоций нет. Есть Мир. После битвы при Эндоре и смерти императора Палпатина Люк Скайуокер, ныне гроссмейстер-джедай, вернулся на Явин IV, чтобы восстановить Орден джедаев. Запустите игру с технологией §YPsionic Theory§!."
 civic_new_galactic_senate: "Сенат Новой Республики"
 civic_new_galactic_senate_desc: "Руководящий орган Новой Республики."
 tech_rebel_alliance_army: "Армия Альянса"
 tech_rebel_alliance_army_desc: "Военное подразделение Альянса повстанцев, а затем и сухопутных войск Новой Республики, состоящее из Особых сил Альянса и различных секторальных сил, контролируемых командующим сектором. Многие бойцы были из ранее организованных ячеек повстанцев или имперских перебежчиков со всей галактики, привнося свой опыт и подготовку для создания высокомобильных и устойчивых боевых сил."
 tech_rebel_alliance_vehicles: "Бронетехника повстанцев"
 tech_rebel_alliance_vehicles_desc: "Альянс повстанцев, разношерстная группа, использует множество различных ховертанков и спидеров, подаренных мирами, которые тайно противостоят Империи."
 RT_CHANCELLOR: "Канцлер Новой Республики"
 RT_CHANCELLOR_FEMALE: "Канцлер Новой Республики"
