 FLAG_CATEGORY_chiss: "Господство чиссов"
 trait_chiss_species: "Чисс"
 trait_chiss_species_desc: "Раса высоких гуманоидов с синей кожей с планеты Ксилла, чиссы взрослеют быстрее, чем большинство гуманоидов, но имеют более короткую продолжительность жизни. Это также умный, дисциплинированный, расчетливый и рассудительный вид, который превыше всего ценит приличия и самоконтроль. Из-за своей ксенофобии по отношению к другим расам чиссы по своей природе являются изоляционистами."
 chiss_space_init_NAME: "Пространство чиссов"
 chiss_space_init_DESC: "Запускаем в системе Csilla; столица Чиссского господства и центр чиссского пространства. Этот старт системы также включает в себя несколько систем чиссов, в том числе: Чиорал, Спозиа, Напорар, Коперо, Цаус и Ригар."
 csilla_init_NAME: "Система Csilla"
 csilla_init_DESC: "Запускаем в системе Csilla; столица Чиссского господства."
 eoth_init_NAME: "Система Нирауан"
 eoth_init_DESC: "Старт в системе Нирауан; столица Империи Руки в Неизведанных Регионах. Также включает систему Ригар в качестве соседней звездной системы."
 chiss_capital: "Город Чаплар"
 chiss_capital_desc: "Ксилла, известная как родина чиссов, представляет собой холодный мир, наполненный ледниками и ледяными пещерами. В столице Чаплар расположены Дворец Дома, Экспедиционная библиотека, парламент и штаб Чиссских экспансионистских сил обороны (CEDF)."
 expeditionary_library: "Экспедиционная библиотека"
 expeditionary_library_desc: "Этот подземный комплекс под ледяной поверхностью Ксиллы представляет собой безопасную библиотеку, содержащую документы и произведения, полученные в результате исследования Неизвестных регионов Чиссскими экспансионистскими силами обороны. Он также содержит множество секретов, касающихся гиперпространственных маршрутов, антропологических эссе и трактатов по ксенобиологии каждого вида, с которым столкнулись чиссы."
 house_csapla: "Дом Чапла"
 house_csapla_desc: "Одна из девяти правящих семей Чиссского господства, этот дом специализируется на управлении ресурсами, сельском хозяйстве и колониальных делах. Это самый важный дом в Доминировании чиссов, а планета Чиорал сильно урбанизирована, что позволяет создать полдюжины сельскохозяйственных колоний чиссов."
 house_nuruodo: "Дом Нуруодо"
 house_nuruodo_desc: "Одна из девяти правящих семей Чиссского господства, этот дом специализируется на военном деле и внешней политике с другими расами. Это второй по значимости дом в Доминировании чиссов."
 house_inrokini: "Дом Инрокини"
 house_inrokini_desc: "Одна из девяти правящих семей Чиссского господства, этот дом специализируется на промышленности, невоенной науке и коммуникациях в чиссском пространстве."
 house_sabosen: "Дом Сабосен"
 house_sabosen_desc: "Одна из девяти правящих семей Чиссского господства, этот дом специализируется на законе и порядке, здравоохранении и образовании на территории чиссов."
 chiss_shipyards: "Верфи Коперо"
 chiss_shipyards_desc: "Коперо является домом для крупнейших верфей Чиссского господства, которые постоянно пополняют флот Чисских экспансионистских сил обороны."
 copero_city: "Коперо Сити"
 copero_city_desc: "В этом оживленном городе, расположенном в горном мире Коперо, проживают тысячи чиссов со всего Чиссского господства."
 chiss_military_academy: "Учебная академия Синдика Митт'рау'нуруодо"
 chiss_military_academy_desc: "Учебная академия и летная школа на замерзшей планете Ригар. В купольной конструкции размещались сотни кадетов как из Империи Руки, так и из Чиссских Экспансионных Сил Обороны, а также тренировочный полк объектов, сосредоточенный на обучении спорным боевым стратегиям изгнанного синдика Митт'рау'нуруодо, известного как Траун, гранд-адмирала Галактической Империи."
 hand_of_thrawn: "Рука Трауна"
 hand_of_thrawn_desc: "Штаб-квартира и мир-крепость Империи Руки, Рука Трауна, была названа в честь своего основателя гранд-адмирала Трауна как база операций в Неизвестных регионах."
