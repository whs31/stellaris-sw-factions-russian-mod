 gov_first_order: "ура-патриотические империалисты"
 gov_first_order_desc: "Самодержавная военная хунта, сформированная из остатков Галактической Империи. Структура правительства Первого Ордена полностью основана на военной иерархии, устраняющей любые различия между армией и государством."
 RT_SUPREME_LEADER: "Верховный лидер"
 RT_SUPREME_LEADER_FEMALE: "Верховный лидер"
 HT_ALLEGIANT_GENERAL: "Верный Генерал"
 HT_ALLEGIANT_GENERAL_FEMALE: "Верный генерал"
 gov_sith_eternal: "Культ ситхов"
 gov_sith_eternal_desc: "Тайный фанатичный культ, созданный для служения и поклонения Ордену ситхов и Темному Лорду ситхов."
 gov_final_order: "Фанатики ситхов-империалистов"
 gov_final_order_desc: "Империалисты Первого Ордена объединились с элементами культа Вечных ситхов под абсолютным контролем Темного Лорда Ситхов."
 civic_first_order_military: "Проект «Воскрешение»"
 civic_first_order_military_desc: "Операция, поддерживаемая Первым Орденом, направленная на усиление армии новыми рекрутами и передовыми технологиями."
 civic_sith_cult: "Культ ситхов"
 civic_sith_cult_desc: "По всей галактике существует множество форм культов ситхов, от культа Экзара Куна до последователей Рагноса. Однако все они выказывают бессмертное почтение к ситхам. В империях, где существуют крупные организованные культы ситхов, часто есть харизматичный человек, обладающий темной стороной Силы, который вдохновляет веру. Вечный Ситх Палпатина был одним из таких культов. Выбор этого гражданского общества добавит черту §YChosen One§! к вашему начальному правителю и разблокирует технологию §YPsionic Theory§!."
 origin_fo_supremacy: "Превосходство"
 origin_fo_supremacy_desc: "Суперзвездный разрушитель класса «Мега», служащий мобильной штаб-квартирой Первого Ордена."
 origin_tooltip_origin_fo_supremacy_effects: "Начните игру «Превосходство»; Суперзвездный дредноут Мега-класса, который служит вашей мобильной столицей и производственным комплексом."
 sm_supremacy_foundry: "Литейная мастерская превосходства"
 sm_supremacy_foundry_desc: "Звездный дредноут класса Мега, служащий столицей Первого Ордена, представляет собой огромный военный корабль, обладающий всеми необходимыми удобствами: от полностью автономной среды обитания в глубоком космосе до современной мобильной верфи, способной конкурировать с большинством промышленных миров."
 trait_sith_cultist: "Ситх-культист"
 trait_sith_cultist_desc: "Скрытные, опасные и крайне фанатичные секты ситхов служат своим хозяевам с бессмертным фанатизмом и почтением к темной стороне силы."
 name_list_first: "Первый Орден"
 FLAG_CATEGORY_first: "Первый Орден"
 starkiller_system_NAME: "Система Старкиллер"
 starkiller_system_DESC: "Начните на базе «Старкиллер», супероружии огромной силы, встроенном в священный мир Ордена джедаев Илум. Мобильный звездный дредноут Первого Ордена также находится неподалеку."
 exegol_init_NAME: "Система Экзегол"
 exegol_init_DESC: "Начните с Экзегола; скрытый древний бастион ситхов и штаб-квартира Вечного культа ситхов и Последнего порядка."
 origin_sith_eternal: "Культ ситхов"
 origin_sith_eternal_desc: "Тайный культ, поклоняющийся темной стороне Силы и древним ситхам как истинным хозяевам этой галактики."
 origin_tooltip_sith_eternal_effects: "Запустите систему Exegol на Exegol; пустынная планета и местонахождение давно забытой крепости ситхов."
 sith_fortress: "Мир-крепость ситхов"
 sith_fortress_desc: "Древний храм ситхов, расположенный на скрытом мире ситхов Экзегол, штаб-квартира Вечного культа ситхов и Трон ситхов. Сама цитадель представляла собой массивную подземную крепость с большой перевернутой пирамидальной конструкцией из черного камня, расположенной на поверхности."
 building_sith_citadel: "Цитадель ситхов"
 building_sith_citadel_desc: "Древняя крепость ситхов на планете Экзегол. Это штаб-квартира Вечного культа ситхов, в которой находится Трон ситхов."
 d_sith_citadel: "Цитадель ситхов"
 d_sith_citadel_desc: "Древняя крепость ситхов, содержащая огромные памятники ситхам. Под крепостью находится древняя верфь и кузница."
 thermal_oscillator: "Термический генератор"
 thermal_oscillator_desc: "Этот компонент, расположенный на поверхности базы «Старкиллер», хранит и хранит темную энергию, собранную от звезды, вокруг которой он вращается. Это обеспечивает достаточно энергии не только для питания самой базы, но и для стимулирования физических исследований."
 fortress_world: "Мир-крепость"
 fortress_world_desc: "На этой переоборудованной мобильной ледяной планете, служащей оплотом в пространстве Первого Ордена, находятся легионы солдат, офицеров и ученых, которые патрулируют и управляют механизмами на планете. Он также оснащен генератором планетарного щита для защиты от орбитальной бомбардировки."
 supremacy_initializer_NAME: "Превосходство"
 supremacy_initializer_DESC: "Начните игру «Превосходство»; Мобильный крупный корабль Первого Ордена."
 weapon_testing_labs: "Лаборатории испытаний оружия"
 weapon_testing_labs_desc: "На краю каждого крыла находится ряд сверхсекретных исследовательских и оружейных объектов, обеспечивающих новейшие исследовательские технологии."
 mobile_capital: "Мобил Капитал"
 mobile_capital_desc: "Превосходство, служащее командным центром, верфью и тренировочным центром, считается мобильным городом с удобствами, которые могут конкурировать с большинством столичных миров."
 mobile_training_facility: "Бортовые средства обучения"
 mobile_training_facility_desc: "Этот огромный корабль предлагает полностью готовые к использованию тренировочные базы и казармы для целых легионов солдат."
 hyperspace_tracker: "Судовой комплекс управления слежением"
 hyperspace_tracker_desc: "Этот активный трекер, недавно разработанный генералом Армитиджем Хаксом, позволял «Превосходству» обнаруживать космические корабли, путешествующие в гиперпространстве. Он использовал генератор статического гиперпространственного поля, который ускорял скорость вычислений до невообразимых уровней."
 pc_invisible_star: "Глубокий космос"
 pc_invisible_star_desc: "Глубокие просторы космоса."
 district_supremacy_housing: "Палуба членов экипажа"
 district_supremacy_housing_plural: "Палубы членов экипажа"
 district_supremacy_housing_desc: "На корабле «Превосходство» проживают миллионы членов экипажа, обеспечивающие основные удобства и бортовые гидропонные установки."
 district_supremacy_energy: "Установка термоядерного генератора"
 district_supremacy_energy_plural: "Установка термоядерного генератора"
 district_supremacy_energy_desc: "«Превосходство» питается от нескольких больших термоядерных генераторов, питающих огромный корабль."
 district_supremacy_science: "Исследовательская лаборатория"
 district_supremacy_science_plural: "Исследовательские лаборатории"
 district_supremacy_science_desc: "В Превосходстве расположены передовые исследовательские центры, обеспечивающие технологические достижения Первого Ордена."
 district_supremacy_mining: "Объект по сбору астероидов"
 district_supremacy_mining_plural: "Горнодобывающие предприятия на астероидах"
 district_supremacy_mining_desc: "«Превосходство» — это автономный военный корабль, который может добывать ресурсы через центры обработки астероидов для питания своих промышленных производственных мощностей."
 district_supremacy_arms_industry: "Панель управления транспортным средством"
 district_supremacy_arms_industry_plural: "Операционные палубы"
 district_supremacy_arms_industry_desc: "В «Превосходстве» расположены военные производственные мощности, которые создают военную технику для Первого Ордена."
 district_supremacy_barracks: "Казармы экипажа"
 district_supremacy_barracks_plural: "Казармы экипажа"
 district_supremacy_barracks_desc: "Этот командный корабль также содержит обширные возможности для обучения новобранцев, членов экипажа и легионов штурмовиков."
 d_supremacy_weapon_testing_labs: "Судовые исследовательские лаборатории"
 d_supremacy_weapon_testing_labs_desc: "На краю каждого крыла находится ряд сверхсекретных исследовательских и оружейных объектов, обеспечивающих новейшие исследовательские технологии."
 d_supremacy_training_facilities: "Корабельные учебные казармы"
 d_supremacy_training_facilities_desc: "Полностью оборудованные тренировочные казармы для целого легиона штурмовиков на борту «Превосходства»."
 d_supremacy_hyperspace_tracker: "Корабельный гиперпространственный трекер"
 d_supremacy_hyperspace_tracker_desc: "Система активного слежения, недавно разработанная генералом Армитиджем Хаксом, позволяет «Превосходству» обнаруживать космические корабли, путешествующие в гиперпространстве. Он использует генератор статического гиперпространственного поля, который ускорил скорость вычислений до невообразимых уровней."
 d_supremacy_foundries: "Судовые литейные цеха"
 d_supremacy_foundries_desc: "Объекты, предназначенные для производства военных материалов и оружия."
 d_supremacy_hydroponics: "Судовые предприятия по производству пищевых продуктов"
 d_supremacy_hydroponics_desc: "Предприятия по производству продуктов питания."
 d_supremacy_throne_room: "Тронный зал корабля"
 d_supremacy_throne_room_desc: "Большая комната, оснащенная голографическим проектором, используемым для передачи приказов Превосходства."
 pc_supremacy: "Звездный дредноут мега-класса"
 pc_supremacy_desc: "Первый из линейки Звездных Дредноутов Мега-класса и мобильная столица Первого Ордена."
 tech_first_order_army: "Военные Первого Ордена"
 tech_first_order_army_desc: "Военные Первого Ордена."
 tech_first_order_vehicles: "Боевые машины Первого Ордена"
 tech_first_order_vehicles_desc: "Техника Первого Ордена"
 tech_sith_eternal_army: "Вечные военные ситхов"
 tech_sith_eternal_army_desc: "Военное подразделение фанатичного культа Вечных ситхов."
 first_order_stormtroopers: "Дивизия штурмовиков"
 first_order_stormtroopers_desc: "Штурмовики, полностью покрытые ослепительно-белыми доспехами, являются стандартной пехотой Первого Ордена. Это фанатичные, верные и послушные солдаты."
 first_order_stormtrooper_garrison: "Гарнизон штурмовиков"
 first_order_stormtrooper_garrison_desc: "Гарнизон штурмовиков Первого Ордена."
 first_order_flametroopers: "Дивизия огнеметчиков"
 first_order_flametroopers_desc: "Специализированный вариант корпуса штурмовиков, вооруженный огнеметами для испепеления врагов Первого Ордена."
 first_order_heavy_troopers: "Дивизия тяжелых штурмовиков"
 first_order_heavy_troopers_desc: "Специализированный тяжелый штурмовой вариант корпуса штурмовиков, использующий мегабластер FWMB-10 для уничтожения защищенных целей."
 first_order_jet_troopers: "Дивизия реактивных самолетов"
 first_order_jet_troopers_desc: "Специализированный воздушно-десантный вариант корпуса штурмовиков, в котором для повышения маневренности и мобильности используются реактивные ранцы."
 first_order_elite_stormtroopers: "Элитный отряд штурмовиков"
 first_order_elite_stormtroopers_desc: "Элитные коммандос Первого Ордена, которым поручено проведение уловок и специальных операций."
 sith_eternal_sithtroopers: "Дивизия солдат ситхов"
 sith_eternal_sithtroopers_desc: "Элитные солдаты армии Вечных ситхов, одетые в малиново-красную броню, усиленную прочным композитом из гаммапласта и вооруженные тяжелым бластером ST-W48."
 sith_eternal_jet_troopers: "Дивизия реактивных десантников ситхов"
 sith_eternal_jet_troopers_desc: "Элитный вариант солдат ситхов, используемый для воздушного нападения."
 sith_eternal_sovereign_protectors: "Суверенные защитники ситхов"
 sith_eternal_sovereign_protectors_desc: "Элитные преторианские телохранители Вечных Ситхов, одетые в красно-черные доспехи и вооруженные бластерной винтовкой SP-B50 с виброклинком для ближнего боя."
 first_order_125z_treadspeaders: "Тредспидеры 125-Z"
 first_order_125z_treadspeaders_desc: "Бронированные спидербайки, используемые для разведки и легких нападений. Вооружен двумя тяжелыми лазерными пушками."
 first_order_uatt_walkers: "Ходунки UA-TT"
 first_order_uatt_walkers_desc: "Городские штурмовые шагоходы, используемые для городских боев. Вооружен множеством бластерных пушек и легких многозарядных бластеров для борьбы с пехотой, а также грейфером для борьбы с беспорядками."
 first_order_atst_walkers: "Ходунки AT-ST"
 first_order_atst_walkers_desc: "Вездеходный разведывательный транспорт — бронированный шагоход-разведчик, используемый Первым Орденом для борьбы с пехотой, с улучшенной броней."
 first_order_atat_walker: "AT-AT Уокер"
 first_order_atat_walker_desc: "Вездеходный бронированный транспорт — это большой шагоход, обновленный по дизайну Галактической Империи и имеющий более прочную броню и повышенную огневую мощь."
 first_order_atm6_walker: "Шагоход AT-M6"
 first_order_atm6_walker_desc: "All Terrain MegaCaliber Six — это массивный тяжелый артиллерийский и штурмовой шагоход, который используется для полного уничтожения наземных целей."
 first_order_tie_fighters: "Истребительная эскадрилья TIE/fo"
 first_order_tie_fighters_desc: "Истребители космического превосходства, модернизированные по сравнению со старой моделью TIE, оснащенные щитами и более мощными лазерными пушками."
 first_order_sf_tie_fighters: "Истребительная эскадрилья TIE/SF"
 first_order_sf_tie_fighters_desc: "Элитные истребители завоевания космического превосходства, предназначенные для бойцов спецназа Первого Ордена. Оснащены мощными щитами, лазерными пушками, ракетной установкой и тяжёлой лазерной турелью."
 first_order_tie_bombers: "Эскадрилья бомбардировщиков TIE/se"
 first_order_tie_bombers_desc: "Бомбардировщик Первого Ордена, созданный на основе старых моделей TIE и получивший усиленное вооружение и щиты."
 first_order_atpd_walkers: "Шагоходы AT-PD"
 first_order_atpd_walkers_desc: "Автоматические оборонительные шагоходы для защиты ключевых объектов. Вооружены двумя тяжёлыми лазерными пушками против пехоты и лёгкой техники."
 first_order_atma_walkers: "Шагоходы AT-MA"
 first_order_atma_walkers_desc: "Автоматические артиллерийские шагоходы для защиты ключевых объектов Первого Ордена. Вооружены мощным артиллерийским орудием и двумя тяжёлыми лазерными пушками."
 sw_mandalorian: "Мандалорец"
 sw_mandalorian_desc: "Мандо'аде."
 sw_mandalorian_plural: "Мандалорцы"
 sw_mandalorian_insult_01: "мясник"
 sw_mandalorian_insult_plural_01: "мясники"
 sw_mandalorian_compliment_01: "благородный воин"
 sw_mandalorian_compliment_plural_01: "благородные воины"
 sw_mandalorian_spawn: "найдёныш"
 sw_mandalorian_spawn_plural: "найдёныши"
 sw_mandalorian_sound_01: "рычание"
 sw_mandalorian_sound_02: "ворчание"
 sw_mandalorian_sound_03: "тявканье"
 sw_mandalorian_sound_04: "завывание"
 sw_mandalorian_sound_05: "мяуканье"
 sw_mandalorian_organ: "живот"
 sw_mandalorian_mouth: "рот"
 sw_mandalorian_hand: "кулак"
 RT_MANDALORE: "Манд'алор"
 RT_MANDALORE_FEMALE: "Манд'алор"
 gov_mandalorian_clans: "Мандалорские кланы"
 gov_mandalorian_clans_desc: "Свободное, но готовое к сотрудничеству объединение кланов во главе с вождями, подчиняющимися Манд'алору. Из-за кочевого образа жизни мандалорцы мало заинтересованы в централизованной власти."
 name_list_neocrusader: "Мандалорские неокрестоносцы"
 civic_mandalore: "Манд'алор"
 civic_mandalore_desc: "Единственный правитель мандалорских кланов, Манд'алор одновременно является королем и воином-генералом. Титул и его символическая маска передавались из поколения в поколение и считаются призывом всех мандалорских кланов объединиться под одним знаменем. Выбор этого гражданского общества предоставит вашему правителю черту §YWarlike§! и разблокирует технологию §YЦентрализованное командование§! и §YБоевая подготовка§! в начале игры."
 japrael_system_initializer_NAME: "Система Джапраэль"
 japrael_system_initializer_DESC: "Запустите систему Japrael. Эта система печально известна расположением Ондерона и Луны в джунглях Дксуна, где мандалорские неокрестоносцы начали войну с Республикой.\n\n$system_initializer_DESC$"
 beasts_of_dxun: "Звери Дксуна"
 beasts_of_dxun_desc: "Множество хищников в густых джунглях Дксуна очень агрессивны и чрезвычайно опасны. В некоторых случаях из-за непосредственной близости Ондерона и его спутника Дксуна звери могут свободно перемещаться между планетой и соединяющейся атмосферой луны, находясь на близкой орбите."
 city_of_iziz: "Город Изиз"
 city_of_iziz_desc: "Город Изиз — большой укрепленный город-крепость на Ондероне, который служит столицей и единственным современным поселением жителей Ондерона."
 beast_riders: "Звериные наездники"
 beast_riders_desc: "Звериные наездники — группа ондеронских диссидентов, изгнанных из окруженного стеной города Изиз на съедение бродячим зверям в джунглях. Однако в прошлом они постепенно приручили зверей и вели войну с народом Изиза. В конце концов они заключили хрупкий мир с ондеронцами."
 mandalorian_outpost: "Мандалорский аванпост"
 mandalorian_outpost_desc: "Этот комплекс, считающийся скрытым штабом мандалорской армии неокрестоносцев, предоставляет мандалорцам просторную тренировочную площадку, пост прослушивания, тайник с оружием и центральный командный центр."
 tomb_of_freedon_nadd: "Гробница Фридона Надда"
 tomb_of_freedon_nadd_desc: "Гробница Фридона Надда — место захоронения печально известного бывшего короля Ондерона и Темного лорда ситхов Фридона Надда. Это также важный узел тёмной стороны с неиспользованным потенциалом."
 mandalore_system_initializer_NAME: "Система Мандалор"
 mandalore_system_initializer_DESC: "Начните в системе Мандалор; культурный родной мир мандалорцев."
 city_of_keldabe: "Город Келдэйбл"
 city_of_keldabe_desc: "Келдабе — столица Мандалора. Город представляет собой густонаселенный городской центр и место расположения центрального правительства и торговли в этом секторе."
 mandalmotors: "Прото-МандалМоторс"
 mandalmotors_desc: "Расположенная в городе Келдабе компания MandalMotors — развивающаяся судостроительная и оружейная компания для мандалорцев. Он известен своим качеством."
 beskar_mines: "Рудники Бескара"
 beskar_mines_desc: "В этих шахтах, расположенных по всей луне Конкордии, добывают редкую металлическую руду, известную как мандалорское железо, которая служит чрезвычайно прочным материалом для бронежилетов и корпусов звездолетов. К сожалению, разветвленная сеть шахт на Луне нанесла серьезный ущерб окружающей среде."
 FLAG_CATEGORY_neocrusader: "Нео-крестоносец"
 trait_mandalorian: "Мандалорец"
 trait_mandalorian_desc: "Этот вид выбрал путь Мандо'аде, кочевой группы клановых воинов, связанных своей культурой и традициями. Мандалорцы — исключительные бойцы на поле боя, поскольку их культура предполагает конфликты и борьбу как образ жизни."
 leader_trait_ruler_mandalore: "Манд'алор"
 leader_trait_ruler_mandalore_desc: "Высшее символическое олицетворение мандалорской культуры, чести и единства. Действуя одновременно как король и воин-генерал, Мандалор является сильнейшим лидером мандалорских кланов."
 cb_initiate_mando_crusade: "Инициировать Мандалорский крестовый поход"
 cb_initiate_mando_crusade_desc: "Соберите кланы, чтобы начать новый мандалорский крестовый поход по галактике."
 mando_crusade_cb_option_window: "Мандалорский крестовый поход - Casus Belli"
 mando_crusade_cb_option_description: "Хотите начать §YМандалорский крестовый поход§! Total War Casus Belli?"
 mando_crusade_cb_yes: "Это Путь."
 mando_crusade_cb_no: "Нет, это не тот путь."
 mandalorian_warriors: "Мандалорские воины"
 mandalorian_warriors_desc: "Воины Мандалора, сражающиеся за честь и славу. Каждый мандалорец — высококвалифицированный боец, владеющий разнообразными бластерами, рипперами, огнеметами, виброклинками и наручными ракетными установками."
 mandalorian_shock_troopers: "Мандалорские ударные солдаты"
 mandalorian_shock_troopers_desc: "Элитные мандалорские военные специалисты, оснащенные модернизированной и более тяжелой штурмовой броней бескар, включая персональные энергетические щиты, реактивные ранцы и лучшее высококачественное вооружение из мандалорских боевых кузниц."
 mandalorian_knights: "Мандалорские рыцари"
 mandalorian_knights_desc: "Особые, чувствительные к силе мандалорские воины, первоначально созданные из перебежчиков-джедаев, принявших мандалорский путь. Каждый рыцарь облачен в серебристо-серую штурмовую броню и вооружен световыми мечами с оранжевыми лезвиями."
 mandallian_giants: "Мандаллианские гиганты"
 mandallian_giants_desc: "Крупные воины, предложившие свои услуги мандалорским кланам, известным своей боевой доблестью и силой."
 mandalorian_basilisk_war_droid: "Боевой дроид Василиск"
 mandalorian_basilisk_war_droid_desc: "Мощные полуразумные боевые дроиды, первоначально созданные расой василисканцев, теперь используемые в качестве боевых железных зверей в крупных мандалорских крестовых походах. Каждый боевой дроид «Василиск» до зубов вооружен лазерными пушками, импульсно-волновыми пушками и пусковыми установками для осколочных ракет. Хотя эти дроиды способны к автономности, мандалорцы обычно отправляются в бой на этих боевых машинах."
 tech_mandalorian_mandal_hypernautics: "Корпорация Мандал Гипернаутикс"
 tech_mandalorian_mandal_hypernautics_desc: "Организация по производству кораблей и танков, основанная на Мандалоре, которая поставляла мандалорским кланам высококачественную военную технику."
 mandalorian_turbotank: "Мандалорский турботанк"
 mandalorian_turbotank_desc: "Мощные наземные и осадные машины, сосредоточенные вокруг гигантского колеса, вооруженного двумя большими лазерными пушками и двумя лазерными пушками, установленными на подбородке."
 mandalorian_canderous_assault_tank: "Штурмовой танк класса «Кандерос»"
 mandalorian_canderous_assault_tank_desc: "Тяжелые репульсорные танки производства компании MandalMotors, которые имеют мощную защиту и вооружены двумя тяжелыми пушками с массовым приводом и одной пусковой установкой для ударных ракет."
 building_mandalorian_war_camps: "Мандалорские военные лагеря"
 building_mandalorian_war_camps_desc: "Мандалорские лагеря использовались для обучения и набора новых воинов для кланов."
 building_mandalorian_war_forges: "Мандалорские военные кузницы"
 building_mandalorian_war_forges_desc: "Кузницы оружия и транспортных средств, используемые мандалорцами для разработки военной техники для мандалорцев."
 horuset_init_NAME: "Система Хорусет"
 horuset_init_DESC: "Вторичная столица Империи ситхов Ревана и место рождения Ордена ситхов."
 kotorsith_academy: "Академия ситхов"
 kotorsith_academy_desc: "Эта академия служит выдающейся тренировочной площадкой для начинающих ситхов."
 kotorvalley_of_the_dark_lords: "Долина Темных Лордов"
 kotorvalley_of_the_dark_lords_desc: "Расположенная недалеко от академии ситхов, долина представляет собой обширный некрополь древних гробниц умерших лордов ситхов. Говорят, что некоторые лорды ситхов продолжают жить как мстительные духи, запертые в своих гробницах, убивая или развращая многих, кто осмеливается проникнуть внутрь."
 dreshdae_settlement: "Поселение Дрешдэ"
 dreshdae_settlement_desc: "Единственное цивилизованное поселение на Коррибане. В рабочей колонии находится филиал корпорации Czerka, который управляет космопортом и местной торговлей в системе."
 origin_coruscant: "Королева Ядра"
 origin_coruscant_desc: "Старт на Корусанте; экуменополис и центр галактической цивилизации."
 origin_tooltip_coruscant_effects: "- Запуск в системе §YCoruscant§! на §YCoruscant§!; §Y$pc_city$§! в качестве вашего родного мира."
 coruscant_origin_init_NAME: "Корусантская система (общая)"
 coruscant_origin_init_DESC: "Старт в системе Корусант на Корусанте; центр галактической цивилизации."
 START_SCREEN_PART_ONE_CORUSCANT: "Планета Корусант долгое время была центром торговли, коммерции и политической власти нескольких галактических цивилизаций. Корусант, известный как «Галактический город», охватывающий всю планету в мировом экуменополисе, состоящем из огромных городов и промышленных районов как над, так и под поверхностью этого мира, стал либо символом демократии, либо центром имперской власти. Независимо от того, какая фракция имеет власть над этой планетой, ее культурное и политическое влияние как «Королевы Ядра» невозможно переоценить."
 origin_galactic_republic: "Галактическая Республика"
 origin_galactic_republic_desc: "Старт на Корусанте; экуменополис и столица давней галактической демократии."
 origin_tooltip_galactic_republic_effects: "- Запуск в системе §YКорусант §! на §YCoruscant§!; §Y$pc_city$§! в качестве вашего родного мира. Этот источник также предлагает несколько инициализаторов эры, от старой республики до эры новой республики, для запуска этой системы."
 origin_cis_separatists: "Альянс сепаратистов"
 origin_cis_separatists_desc: "Старт на Раксус Секундус; столица Конфедерации независимых систем."
 origin_tooltip_cis_separatists_effects: "- Запустите систему §YRaxus §! на §YRaxus Secundus§!. Включает другие крупные сепаратистские миры, такие как Джеонозис, Муунилист, Неймодия и Скако."
 origin_galactic_empire: "Галактическая Империя"
 origin_galactic_empire_desc: "Старт в Имперском центре; экуменополис и столица галактической империи."
 origin_tooltip_galactic_empire_effects: "— Начинает игру в §Yсистеме Корусант§! на §YКорусанте§!, §Y$pc_city$§!, который станет родным миром. Для этой системы также доступны варианты разных эпох — от возвышения Империи до эпохи Наследия."
 origin_sith_empire: "Империя ситхов"
 origin_sith_empire_desc: "Начинает игру в системе Дромунд, Бешкек или Экзегол — столицах Возрождённой Империи ситхов, Тёмной Империи и Вечных ситхов соответственно."
 origin_tooltip_sith_empire_effects: "— Родным миром станет §YДромунд-Каас§!, §YБисс§! или §YЭкзегол§!."
 origin_malachor: "Зов Малакора"
 origin_malachor_desc: "В галактике есть место, где особенно сильна тёмная сторона Силы. Оно связано с ситхами, но его питала война. Оно развращает каждого, кто ступает на его поверхность, погружая в мощь тёмной стороны. Оно искажает всё живое и питается смертью."
 origin_tooltip_malachor_effects: "Начинает игру на Малакоре V, где находятся давно забытая академия ситхов и штаб-квартира Триумвирата ситхов."
 origin_eternal_throne: "Вечный трон"
 origin_eternal_throne_desc: "Начинает игру на Закууле — столице Вечной Империи."
 origin_tooltip_eternal_throne_effects: "— Начинает игру в §Yсистеме Закуул§! на §YЗакууле§!, §Y$pc_tropical$§!, который станет родным миром. Первый правитель получит бессмертие."
 origin_chiss_ascendancy: "Доминация чиссов"
 origin_chiss_ascendancy_desc: "Начинает игру на Ксилле — столице Доминации чиссов."
 origin_tooltip_chiss_ascendancy_effects: "- Запуск в системе §YCsilla §! на §YCsilla§!; a §Y$pc_arctic$§! в качестве вашего родного мира вместе с окружающими системами в пространстве чиссов. Вашему первому правителю будет даровано бессмертие."
 personality_confederacy_ai: "Сепаратисты"
 personality_confederacy_ai_desc: "Сепаратисты ценят свободную торговлю и свою независимость и будут бороться за то и другое."
 personality_galactic_republic_ai: "Граждане Республики"
 personality_galactic_republic_ai_desc: "Граждане Республики ценят демократию, мир и торговлю. Они готовы взаимодействовать с другими империями-единомышленниками для создания новых союзов."
 personality_galactic_empire_ai: "Галактические Империалисты"
 personality_galactic_empire_ai_desc: "Галактические Империалисты считают, что это их право управлять галактикой, и обменивают свободу на порядок и безопасность. Они склонны доминировать над более слабыми империями, с которыми сталкиваются, с помощью силы оружия."
 personality_fel_empire_ai: "Закаленные империалисты"
 personality_fel_empire_ai_desc: "Закаленные империалисты — это имперцы, которые меньше стремятся к военным завоеваниям и предпочитают расширять свою империю другими способами."
 personality_sith_empire_ai: "Ситхи-империалисты"
 personality_sith_empire_ai_desc: "Ситхи-империалисты — это империи, подчиняющиеся Ордену ситхов. Они очень агрессивны по отношению к другим империям и обладают врожденным стремлением к власти и галактическому господству."
 personality_first_order_ai: "Имперские лоялисты"
 personality_first_order_ai_desc: "Имперские лоялисты — это имперцы, преданные авторитарному государству или единому правителю. Они покорят, поработят или очистят любого, кто сопротивляется их законному правлению над галактикой."
 personality_ancient_sith_ai: "Ситхи-фанатики"
 personality_ancient_sith_ai_desc: "Ситхи-зелоты — подданные Империи ситхов, магократии, управляемой Темным лордом ситхов."
 personality_sith_eternal_ai: "Ситхи-лоялисты"
 personality_sith_eternal_ai_desc: "Ситхи-лоялисты — культ правителя ситхов. Они никогда не будут вступать в мирные отношения с другими империями, поскольку считают их лишь потенциальными целями для владычества ситхов."
 personality_eternal_empire_ai: "Лоялисты Закуулан"
 personality_eternal_empire_ai_desc: "Лоялисты Закуулан непоколебимо преданы бессмертному императору и Вечному трону. Они не способны создавать союзы и склонны смотреть свысока на другие, менее развитые империи, как на захолустных варваров, полагая, что их бремя — принести просвещение через порабощение."
 personality_neocrusader_ai: "Мандалорские воины"
 personality_neocrusader_ai_desc: "Мандалорские воины — это свободная группа кланов воинов, которые ищут сильных противников, чтобы проверить себя. Они вряд ли будут формировать альянсы или заключать пакты о ненападении, стремясь в той или иной форме участвовать в боевых действиях. Они питают сильное презрение к пацифистам."
 geonosis_init_NAME: "Система Джеонозис"
 geonosis_init_DESC: "Запускаем в системе Джеонозис; родной мир джеонозийского улья и известный мир-фабрика дроидов Конфедерации независимых систем."
 axum_init_NAME: "Система Аксум"
 axum_init_DESC: "Запускаем в системе Аксум; выдающийся военный и промышленный центр Аксума и Анакса."
 corellia_init_NAME: "Система Кореллия"
 corellia_init_DESC: "Запускаем в системе Кореллии; один из основных основателей Республики и дом Кореллианской инженерной корпорации, мощной судостроительной мегакорпорации."
 alsakan_init_NAME: "Система Алсакан"
 alsakan_init_DESC: "Старт в системе Альсакан в Глубоком Ядре; Крупный экуменополис, которым управляет могущественное королевство Альсакан и старый соперник Корусанта."
 tython_init_NAME: "Система Тайтон"
 tython_init_DESC: "Начните в системе Тайтон на мире-нексусе сил Тайтон."
 kashyyyk_init_NAME: "Система Кашиик"
 kashyyyk_init_DESC: "Старт в системе Кашиик; родной мир вуки и трандошанцев Трандоша."
 naboo_init_NAME: "Система Набу"
 naboo_init_DESC: "Начните в системе Набу на Набу, райском мире и родном мире поселенцев Набу и гунганов."
 empress_teta_init_NAME: "Императрица Тета Система"
 empress_teta_init_DESC: "Старт в системе Императрица Тета; включая знаменитый мир-экуменополис, названный в честь наследия императрицы-воительницы Теты."
 tatooine_init_NAME: "Тату-система"
 tatooine_init_DESC: "Начните в системе Тату на пустынной планете Татуин."
 alsakani_monarchy: "Монархия Алсакани"
 alsakani_monarchy_desc: "Альсакан на протяжении тысячелетий ведет напряженное соперничество со своим соперником на Корусанте. Алсаканцы верили в местную независимость и ограниченное правительство, в то время как Корусанти хотел сильного централизованного правительства и торговли. В конечном итоге эти двое развязали более семнадцати войн из-за идеологии, известных как Альсаканские конфликты. Альсаканцы — очень гордая аристократия и яростно независимые люди."
 xenvaer_city: "Город Зенваер"
 xenvaer_city_desc: "Крупнейший город на Альсакане, в котором есть несколько туристических достопримечательностей и крупные торговые центры."
 wookie_agriculture: "Сельскохозяйственная Луна"
 wookie_agriculture_desc: "Эта луна Кашиика является сельскохозяйственным центром вуки."
 trandoshan_slavers: "Трандошанские работорговцы"
 trandoshan_slavers_desc: "Трандошаны всегда были предметом конфликта с коренными вуки Кашиика. Многие работорговцы охотятся на вуки либо ради спорта, либо ради кредитов, чтобы заработать очки Джаганнатха в пользу своего мифического секретаря."
 hunting_grounds: "Охотничьи угодья"
 hunting_grounds_desc: "Луна Васска была превращена в охотничьи угодья для трандошанских охотников, выполняющих свои обряды становления охотниками. В основном они используют рабов, привезенных из других миров, и выпускают их на свободу для неизбежной охоты."
 wookiee_slave_trade: "Работорговля вуки"
 wookiee_slave_trade_desc: "Благодаря своему сильному телосложению вуки ценятся среди многих работорговцев, которые приходят в мир, чтобы поймать их для каторжных работ в других мирах."
 wookiee_villages: "Деревни вуки"
 wookiee_villages_desc: "Вуки Кашиика построили множество деревень на верхушках деревьев по всей планете, которые служат естественным центром торговли и коммерции с местными вуки."
 shadowlands: "Земли Теней"
 shadowlands_desc: "Также известный как Теневой лес, это темный уровень лесов на Кашиике. Этот район был чрезвычайно опасен, поскольку большие дикие звери, такие как катарнцы и злобные терентатеки, бродили по темным углам Земель Теней. Вуки редко совершают путешествия в Земли Теней, если только они не проводят обряды, в которые вуки отправляются, чтобы проявить себя в борьбе с сильными естественными препятствиями леса. Вуки, совершившие преступления, также были сосланы в Земли Теней."
 cinnagar_city: "Город Циннагар"
 cinnagar_city_desc: "Столица Императрицы Теты — крупный торговый и коммерческий центр, включая Великую библиотеку Циннагара, огромную библиотеку в городе, в которой хранятся бесчисленные произведения искусства, литературы и науки."
 theed_city: "Город Тид"
 theed_city_desc: "Крупное поселение на Набу, в городе также находится Королевский дворец Тид на Набу."
 gungan_city: "Ото Гунга"
 gungan_city_desc: "Подводный город, построенный гунганами и резиденция их правительства."
 nal_hutta_init_NAME: "Система Y'Toub"
 nal_hutta_init_DESC: "Домашняя система картеля хаттов, включая печально известную луну контрабандистов Нар-Шаддаа. Система Tatoo также включена в качестве соседней системы."
 smuggler_moon: "Луна контрабандистов"
 smuggler_moon_desc: "Нар-Шаддаа — пристанище преступников, пиратов и контрабандистов. Его часто называли Вертикальным городом из-за его высоких небоскребов на фоне темной луны. Как сказал бы бывший житель, это «прекрасный смрад и разложение отчаянной жизни»."
 glorious_jewel: "Великолепная драгоценность"
 glorious_jewel_desc: "В переводе с хаттского Нал Хатта — это название, данное хаттами планете Эвокар, бывшему дому эвоциев, которые позже были изгнаны хаттами. В настоящее время планета считается столицей Космоса хаттов и центром преступной деятельности, связанной с кланами хаттов."
 mos_eisley: "Космодром Мос-Эйсли"
 mos_eisley_desc: "Большой космопорт на планете Татуин, расположенный на Великом плато Месра, к северу от Анкорхеда и к юго-востоку от Юндлендских пустошей. Поселение привлекает посетителей со всей галактики, желающих пообщаться в городских кантинах и на рынках. Также было хорошо известно, что нигде в галактике вы не найдете более отвратительного скопления подонков и злодеев."
 tusken_raiders: "Тускенские рейдеры"
 tusken_raiders_desc: "Коренная раса кочевых примитивных форм жизни на Татуине. Они были крайне территориальными, враждебными и жестокими по отношению к любому постороннему, вторгающемуся на их землю. Они также иногда образуют рейдовые отряды, чтобы грабить поселения Татуина и похищать поселенцев."
 sw_creature: "Инопланетяне Star Wars"
 sw_creature_desc: "Неразумные инопланетяне из вселенной «Звездных войн»."
 d_senate_district: "Федеральный округ"
 d_senate_district_desc: "Столица Галактического города на Корусанте, этот район граничит с Финансовым районом и районом Сах'к, в котором расположено множество административных зданий, включая здание Сената."
 d_the_works: "Работы"
 d_the_works_desc: "Крупные промышленные районы Корусанта, известные как сектор 943, служившие крупным производственным центром для многих компаний на Корусанте."
 d_industrial_districts: "Промышленные районы"
 d_industrial_districts_desc: "Крупные промышленные районы, служащие крупными производственными центрами."
 d_galactic_city: "Городской пейзаж Экуменополиса"
 d_galactic_city_desc: "Город всей планеты, наполненный бесконечными высокими небоскребами."
 d_coruscant_hydroponics: "Гидропоника"
 d_coruscant_hydroponics_desc: "Гидропонные растения, используемые для производства воды и выращивания продуктов питания."
 d_valley_of_the_dark_lords: "Долина Темных Лордов"
 d_valley_of_the_dark_lords_desc: "Место захоронения многих королей ситхов и, в конечном итоге, лордов ситхов. Во многих гробницах до сих пор хранятся запрещенные артефакты и сокровища, относящиеся к Золотому веку ситхов."
 d_sith_academy: "Академия ситхов"
 d_sith_academy_desc: "Большое пирамидальное сооружение, используемое для обучения чувствительных к силе путям ситхов."
 d_dreshdae_settlement: "Поселение Дрешдэ"
 d_dreshdae_settlement_desc: "Единственное обитаемое поселение на Коррибане, которое служит столицей и центром торговли в этом пустынном мире."
 d_kaas_city: "Каас Сити"
 d_kaas_city_desc: "Огромный мегаполис и столица Империи ситхов, дом многих важных лордов ситхов."
 d_dark_temple: "Темный Храм"
 d_dark_temple_desc: "Обширное сооружение ситхов, содержащее несколько гробниц давно умерших лордов ситхов, которые до сих пор преследуют это сооружение."
 d_lightning_spikes: "Шипы молний"
 d_lightning_spikes_desc: "Цепь огромных башен, поглощающих энергию частых молний Дромунд-Кааса."
 d_temple_of_the_ancients: "Храм Древних"
 d_temple_of_the_ancients_desc: "Огромное древнее сооружение ракатан, хранящее неисчислимые запретные знания Строителей."
 d_technological_graveyard: "Технологическое кладбище"
 d_technological_graveyard_desc: "Активное поле подавления на поверхности Лехона вынуждало многих путешественников терпеть крушение. Не имея возможности покинуть планету и варварские племена ракатан, они оставляли огромные корпуса кораблей ржаветь на поверхности Раката-Прайм."
 sith_warriors: "Воины-ситхи"
 sith_warriors_desc: "Боевые специалисты ситхов, сражающиеся на передовой. Им поручено уничтожать врагов и утверждать господство ситхов по всей галактике."
 sith_juggernauts: "Джаггернауты-ситхи"
 sith_juggernauts_desc: "Продвинутые воины-ситхи, специализирующиеся на выносливости в бою и носящие усиленную броню."
 sith_marauders: "Мародёры-ситхи"
 sith_marauders_desc: "Продвинутые воины-ситхи, использующие два световых меча и наносящие огромный урон в ближнем бою. Они гораздо подвижнее джаггернаутов, но слабее защищены."
 sith_lord: "Лорд ситхов"
 sith_lord_desc: "Титул членов Ордена ситхов, достигших значительных знаний и могущества в тёмной стороне Силы. Вооружённые алым световым мечом и разрушительными способностями Силы, лорды ситхов входят в число сильнейших представителей своего ордена."
 sith_acolytes: "Послушники ситхов"
 sith_acolytes_desc: "Послушники ситхов, также известные как тёмные джедаи, служат учениками, стажёрами и исполнителями воли Ордена ситхов. Им недостаёт опыта полноценных лордов, но они многочисленны и обучены различным формам боя на световых мечах и приёмам тёмной стороны."
 sith_inquisitors: "Инквизиторы ситхов"
 sith_inquisitors_desc: "Могущественные пользователи Силы, предпочитающие наступательные способности Силы непосредственному бою."
 sith_sorcerers: "Колдуны ситхов"
 sith_sorcerers_desc: "Продвинутые инквизиторы, овладевшие магией ситхов. С помощью заклинаний и ритуалов они создают ужасающие проявления Силы, включая бури, способные уничтожать целые армии."
 sith_assassins: "Ассасины ситхов"
 sith_assassins_desc: "Тайная секта чувствительных к Силе убийц Ордена ситхов, специализирующихся на обмане и устранении целей. Они проникают во вражеские ряды и деморализуют противника скрытностью, диверсиями и дезинформацией. Обычно вооружены двухклинковым световым мечом, через который направляют тёмную сторону."
 sith_imperial_army_division: "Дивизия имперских солдат"
 sith_imperial_army_division_desc: "Имперские солдаты ситхов носят чёрную дюрапластовую броню и вооружены разнообразными бластерами. Каждый боец дисциплинирован и подготовлен к сражениям на передовой."
 sith_mark_1_war_droids: "Боевые дроиды Mark I"
 sith_mark_1_war_droids_desc: "Четвероногие боевые дроиды ситхов с мощными энергетическими щитами и четырьмя бластерными пушками."
 sith_imperial_walker_division: "Имперские шагоходы"
 sith_imperial_walker_division_desc: "Двуногие имперские шагоходы с бластерными пушками и ракетными установками для огневой поддержки наземных войск."
 sith_imperial_crawler_artillery_tank: "Имперский гусеничный танк"
 sith_imperial_crawler_artillery_tank_desc: "Крупная бронированная машина, используемая как транспорт и тяжёлая артиллерия."
 sith_imperial_juggernaut_tank: "Имперский танк-джаггернаут"
 sith_imperial_juggernaut_tank_desc: "Огромный колёсный танк для тяжёлых боёв во враждебной среде, вооружённый тяжёлыми орудиями и лазерными пушками."
 sith_mark_vi_fighter_squadron: "Эскадрилья перехватчиков ISF Mark VI"
 sith_mark_vi_fighter_squadron_desc: "Быстрые и манёвренные истребители завоевания космического превосходства с четырьмя лазерными пушками."
 sith_extinction_bomber_squadron: "Эскадрилья бомбардировщиков B28 «Вымирание»"
 sith_extinction_bomber_squadron_desc: "Эскадрилья бомбардировщиков ситхов с протонными бомбами и торпедами для уничтожения укреплённых целей."
 RT_DARK_LORD_OF_THE_SITH: "Тёмный лорд ситхов"
 RT_DARK_LADY_OF_THE_SITH: "Тёмная леди ситхов"
 HT_SITH_APPRENTICE: "Ученик ситхов"
 HT_SITH_APPRENTICE_FEMALE: "Ученица ситхов"
 jedi_padawans: "Падаваны-джедаи"
 jedi_padawans_desc: "Посвящённые, обучающиеся у рыцаря или магистра Ордена джедаев. Им недостаёт опыта рыцарей, но они владеют основными способностями Силы и формами боя на световых мечах."
 jedi_knights: "Рыцари-джедаи"
 jedi_knights_desc: "Рыцари Ордена джедаев, защищающие невинных и галактику с помощью световых мечей и могущественных способностей Силы."
 jedi_guardians: "Стражи-джедаи"
 jedi_guardians_desc: "Стойкие защитники Ордена джедаев. Эти облачённые в броню рыцари специализируются на фехтовании, воодушевлении союзников и защитных способностях Силы."
 jedi_sentinels: "Часовые-джедаи"
 jedi_sentinels_desc: "Рыцари-джедаи, специализирующиеся на наступательном ближнем бою двумя световыми мечами. Это искусные воины, поражающие уязвимые места врага скоростью и точностью."
 jedi_master: "Магистр-джедай"
 jedi_master_desc: "Высший официальный ранг Ордена джедаев для тех, кто проявил исключительную преданность и мастерство в Силе. Магистры со световыми мечами и развитыми способностями Силы входят в число могущественнейших членов ордена."
 jedi_consulars: "Консулы-джедаи"
 jedi_consulars_desc: "Джедаи, сосредоточенные на путях Силы и способные усмирять противника телекинезом и световыми мечами."
 jedi_sages: "Мудрецы-джедаи"
 jedi_sages_desc: "Могущественные джедаи, владеющие телекинезом и исцелением и способные атаковать Силой на расстоянии."
 jedi_shadows: "Тени-джедаи"
 jedi_shadows_desc: "Тайная секта чувствительных к Силе охотников Ордена джедаев, изначально разыскивавших и уничтожавших артефакты ситхов. Их обучают разведке и тайным операциям, скрытности, диверсиям и дезинформации. Они умелые бойцы, но не предназначены для открытого боя."
