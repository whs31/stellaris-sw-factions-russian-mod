 FLAG_CATEGORY_Sith: "КОТОР Империя ситхов"
 building_sith_academy: "Академия ситхов"
 building_sith_academy_desc: "Учебная площадка для желающих стать Лордами Ситхов."
 building_sith_temple: "Храм ситхов"
 building_sith_temple_desc: "Более крупная и тщательно продуманная учебная академия, созданная для желающих стать лордами ситхов."
 name_list_kotorsith: "КОТОР Империя ситхов"
 trait_sith: "Ситхи-послушники"
 trait_sith_desc: "Многие представители этого вида следуют учениям Ордена ситхов и практикуют темную сторону Силы. Открывает §Y Лидеры ситхов.§!"
 trait_sith_pureblood: "Ситх Чистокровный"
 trait_sith_pureblood_desc: "Либо один из первоначальных видов ситхов, либо человеческий гибрид, краснокожие чистокровные ситхи унаследовали наследие, долгое время переплетавшееся с темной стороной. Они воинственны, соперничают и амбициозны, совершая тайные ритуалы, чтобы укрепить свою связь с темной стороной. Они являются прародителями Ордена ситхов. Открывает §Y Лидеры ситхов.§!"
 leader_trait_sith_scientist: "Ситх-ученый"
 leader_trait_sith_scientist_desc: "Маниакальные и коварные ученые-ситхи безжалостны в своих экспериментах и одержимы идеей получения силы путем открытия артефактов силы."
 leader_trait_sith_governor: "Ситх-губернатор"
 leader_trait_sith_governor_desc: "Находясь на оккупированных мирах, правители ситхов жестоки и репрессивны, чтобы поддерживать стабильность и порядок."
 leader_trait_sith_general: "Ситх-воин"
 leader_trait_sith_general_desc: "Воины-ситхи, описываемые как «неудержимая сила тьмы», — это бойцы на передовой линии Ордена ситхов, владеющие световыми мечами. Выступая в качестве чемпионов на поле битвы, они полагаются на страх, гнев и ненависть, чтобы улучшить свою связь с темной стороной Силы и направить ее злобную силу в себя, чтобы использовать ее в качестве оружия. Воины-ситхи редко отступают от боя."
 leader_trait_sith_admiral: "Адмирал ситхов"
 leader_trait_sith_admiral_desc: "Ситхи на этой позиции руководствуются страхом и запугиванием, используя агрессивную тактику для уничтожения своих врагов. Их связь с Силой также позволяет им чувствовать врагов на больших расстояниях."
 leader_trait_sith_ruler: "Темный Лорд Ситхов"
 leader_trait_sith_ruler_desc: "Титул, присвоенный Ордену ситхов, который представляет собой само воплощение силы и мощи тёмной стороны. Если лидер ослабевает, другой должен подняться, чтобы захватить мантию."
 leader_trait_sith: "Ситхи"
 leader_trait_sith_desc: "Чувствительные к Силе практикующие Тёмную сторону, следующие учениям Ордена ситхов."
 leader_trait_lord_of_the_sith: "Темный Лорд Ситхов"
 leader_trait_lord_of_the_sith_desc: "Титул, присвоенный Ордену ситхов, который представляет собой само воплощение силы и мощи тёмной стороны. Если лидер ослабевает, другой должен подняться, чтобы захватить мантию."
 taris_init_NAME: "Система Тарис"
 taris_init_DESC: "Запуск в системе Тарис; городская планета в секторе Оджостер, ранее известная как Корусант территорий Внешнего Кольца. Примечание. Вы начнете с планеты Экуменополис."
 upper_city: "Верхний город"
 upper_city_desc: "Красивый мегаполис, охватывающий город-мир, населенный привилегированным социальным классом Тариса. Эти сверкающие небоскребы в форме шпилей лишь скрывали глубокое социально-экономическое разделение на нижних уровнях."
 tarisian_military_base: "Тарисианская военная база"
 tarisian_military_base_desc: "Эта военная база, построенная Республикой, была создана с целью найти лекарство от болезни Ракгул. На этом объекте также расположены солдатские казармы и блоки содержания под стражей."
 swoop_gangs: "Банды свупов"
 swoop_gangs_desc: "Многие преступники, преступники и головорезы объединились в банды свуп-байкеров. На улицах Нижнего города были обычным явлением бандитские войны. Две самые известные банды на Тарисе — Скрытые Беки и Чёрные Вулкары."
 rakghouls: "Ракгулы"
 rakghouls_desc: "Под небоскребами Тариса находится Подгород, темная и заброшенная канализация, давно покинутая людьми наверху и лишенная солнечного света. Тарисианские изгои были изгнаны сюда, чтобы жить в нищете тарисийской знатью. К сожалению, Подгород также поражен болезнью Ракгула — инфекцией, вызываемой укусом или царапиной, которая за считанные часы превращает жертву в хищного зверя. Происхождение болезни Ракгул неизвестно, но говорят, что она возникла в результате древней алхимии ситхов."
 sith_naval_base: "Военно-морская база ситхов"
 sith_naval_base_desc: "В Сернпидале находится крупнейшая военно-морская база ситхов в регионе. База надежно защищена контингентом солдат ситхов и боевых дроидов."
 kessiak_city: "Кессиак Сити"
 kessiak_city_desc: "Крепость ситхов на Туле во времена Великой войны ситхов, остатки города служили последним пристанищем «Темного жнеца», катастрофического супероружия ситхов, собиравшего жизненную силу из всего живого. Хотя оружие уже давно разобрано и уничтожено, его остатки все еще можно проанализировать в разрушающемся городе."
 malachor_init_NAME: "Малакорская система"
 malachor_init_DESC: "Домашняя система Триумвирата ситхов, содержащая печально известный мертвый мир Малакор V и место последней битвы Мандалорских войн."
 trayus_academy: "Академия Траюс"
 trayus_academy_desc: "Это древняя реликвия, пережившая разрушение Малакора. Оно было здесь всегда, задолго до Мандалорских войн. Оно притягивает к себе смерть и ненависть, направляет их. Зверства подпитывают его силу, а своей силой он порождает голод."
 malachor_surface: "Поверхность Малакора"
 malachor_surface_desc: "После активации Реваном Генератора Массовой Тени вся поверхность Малакора V была опустошена интенсивным гравитационным вихрем, излучаемым супероружием. Эта гравитационная аномалия все еще существует в этом мире."
 malachor_graveyard: "Кладбище звездолетов"
 malachor_graveyard_desc: "Кладбище звездолетов на орбите Малакора V — это то, что осталось от кораблей, потерянных во время последней битвы Мандалорских войн."
 malachor_sith_temple: "Малакорский храм ситхов"
 malachor_sith_temple_desc: "Давно забытое сооружение, построенное под поверхностью этого пустынного мира, представляет собой древний Храм ситхов и хранилище знаний и силы тёмной стороны."
 d_trayus_academy: "Академия Траюс"
 d_trayus_academy_desc: "Древняя академия ситхов, расположенная на планете. Это древняя реликвия, пережившая разрушение Малакора. Оно было здесь всегда, задолго до Мандалорских войн. Оно притягивает к себе смерть и ненависть, направляет их. Зверства подпитывают его силу, а своей силой он порождает голод."
 d_trayus_core: "Ядро Трайуса"
 d_trayus_core_desc: "Сокровенное святилище Академии ситхов Трайуса на Малакоре V. Это узел тёмной стороны, который использует Малакор V для развращения существ через Темную сторону Силы."
 d_malachor_surface: "Малакорские глубины"
 d_malachor_surface_desc: "Малакор V — это бесплодная и суровая пустошь, возникшая в результате активации Генератора Массовой Тени, который опустошил всю планету, убив тысячи людей и повредив ее поверхность."
 malachor_storm_beasts: "Штормовые звери"
 malachor_storm_beasts_desc: "Малакор V страдает от крупных рептилий, которых манит темная сторона Силы. Эти порождения ситхов пережили разрушение планеты и бродят по ее адским ландшафтам, доступным каждому, кто достаточно глуп, чтобы рискнуть отправиться в ее глубины."
 star_forge: "Звёздная кузница"
 star_forge_DESC: "Древняя военная фабрика, построенная ракатанами во времена расцвета их империи. Звёздная кузница представляет собой гигантскую автоматизированную верфь, черпающую энергию звезды и способную создавать бесконечные запасы кораблей и дроидов."
 star_forge_MEGASTRUCTURE_DETAILS: "Активируйте Звездную Кузницу, огромную фабрику и верфь, способную производить бесконечное количество кораблей и военной техники. Он должен быть связан с орбитальной звездной базой через специальный модуль: «Бесконечный двигатель»."
 star_forge_2: "Звёздная кузница"
 star_forge_2_DESC: "Древняя военная фабрика, построенная Бесконечной Империей ракатан. Сейчас работает на 100% мощности."
 star_forge_3: "Звёздная кузница"
 star_forge_3_DESC: "Древняя военная фабрика, построенная Бесконечной Империей ракатан. Сейчас работает на 200% мощности."
 star_forge_4: "Звёздная кузница"
 star_forge_4_DESC: "Древняя военная фабрика, построенная Бесконечной Империей ракатан. Полностью активирован и теперь работает на 300% мощности."
 StarForgeEvent.1.name: "Активация Звёздная кузница на 33%"
 StarForgeEvent.1.desc: "После нескольких тестовых запусков и нескольких «досадных» аварий Звёздная кузница теперь работает на 33% мощности и продолжает расти. Наши исследователи говорят, что это сочетание энергий тёмной стороны и передовых технологий Раката. Собирая энергию на орбите звезды Лехона, он преобразует эту энергию в любую форму материи, которую мы выбираем, и его возможности для кораблестроения очевидны. При наличии достаточного количества времени, усилий и ресурсов эта кузница может оказаться полезной..."
 StarForgeEvent.2.name: "Активация Звёздная кузница на 100%"
 StarForgeEvent.2.desc: "Благодаря использованию огромной энергии, собранной звездой, Звёздная кузница теперь работает на 100% мощности. Милорд, вам будет приятно узнать, что каждый день Звёздная кузница начинает превосходить наши традиционные верфи с беспрецедентной скоростью. Дальнейшее исследование также показывает, что сама Звёздная кузница полуразумна, как будто она незаметно помогает нам активировать ее системы. Если заработает больше автоматизированных заводов, я считаю, что эта кузница может стать ключом к нашему галактическому превосходству."
 StarForgeEvent.3.name: "Активация Звёздная кузница на 200%"
 StarForgeEvent.3.desc: "Это невероятно, мой Лорд! Звёздная кузница начинает активироваться сама по себе, поскольку автоматизированные системы Звёздной кузницы теперь выполняют большую часть работы. Звёздная кузница сейчас работает на 200% мощности, и вам будет приятно узнать, что каждый день Звёздная кузница продолжает пополнять свой флот новыми кораблями. Такая грубая сила... невообразима, и ее потенциал почти безграничен. Наши исследователи подтверждают, что Звёздная кузница — это больше, чем просто космическая станция. В некотором смысле это похоже на живое существо. Оно голодает. И оно может питаться темной стороной, которая есть внутри каждого из нас. Если эта кузница будет полностью активирована, она откроет новую эру нашей империи."
 StarForgeEvent.4.name: "Активация Звёздная кузница завершена"
 StarForgeEvent.4.desc: "Наконец, после многих лет изучения этой инопланетной структуры и использования ее огромной энергии тёмной стороны, Звёздная кузница полностью работоспособна, и мы уже видим впечатляющие результаты. Милорд, вам будет приятно узнать, что каждый день Звёздная кузница пополняет наш флот новыми кораблями, и он работает почти на 300% от наших прогнозов. Флот собирается вокруг Звёздной кузницы и ждет ваших указаний."
 sm_starforge_module: "Бесконечный двигатель"
 sm_starforge_module_desc: "Чтобы полностью контролировать Звездную Кузницу, Дарт Реван предположил, что на Звездной базе должен быть установлен Бесконечный Двигатель, который будет служить основным каналом связи со станцией."
 rakatan_factory: "Командный центр Звёздной кузницы"
 rakatan_factory_desc: "Центр управления и контроля всей Звёздной кузницы, этот объект имел решающее значение для поддержания работы станции. Здесь также находится большая голограмма самой станции, которая контролирует каждую палубу в режиме реального времени."
 lehon_jcw_init_NAME: "Система Лехон (JCW)"
 lehon_jcw_init_DESC: "Скрытая столица Империи ситхов Ревана, родной мир древних Раката и местонахождение Звёздной кузницы."
 lehonlite_init_NAME: "Система Лехон (без Звёздная кузница)"
 lehonlite_init_DESC: "Скрытая столица Империи ситхов Ревана и родной мир раката."
 rakata_tribes: "Племена раката"
 rakata_tribes_desc: "Остатки древних ракатов, правивших этой системой, по большей части превратились в варварских дикарей. Старшие ракаты, потомки касты жрецов, до сих пор сохраняют часть своих прежних знаний и технологий."
 technological_graveyard: "Технологическое кладбище"
 technological_graveyard_desc: "Раката Прайм усеяна останками разбитых кораблей, ставших жертвами разрушительного поля ракатана на планете."
 temple_of_the_ancients: "Храм Древних"
 temple_of_the_ancients_desc: "Древнее сооружение, оставшееся от прошлой Бесконечной Империи. Он хранит историю и знания раката."
