 gemini_hand: "рука"
 trait_robot_gemini: "БЛИЗНЕЦЫ"
 trait_robot_gemini_desc: "Механическая гуманоидная форма жизни из мира Иокат, связанная с сознанием коллективного разума на частоте БЛИЗНЕЦОВ."
 leader_trait_admiral_gemini_captain: "Капитан БЛИЗНЕЦЫ"
 leader_trait_admiral_gemini_captain_desc: "Капитаны GEMINI связаны внутренним коллективным разумом с другими платформами GEMINI, что позволяет развивать сложное стратегическое мышление и координировать действия с другими капитанами GEMINI."
 trait_zakuul: "Рыцари Закуула"
 trait_zakuul_desc: "Некоторые чувствительные к силе представители этого вида посвятили свою жизнь тому, чтобы стать Рыцарями и Закуулом и верными слугами Вечного Трона. Открывает черты лидера Закуула."
 leader_trait_zakuul_scientist: "Потомок"
 leader_trait_zakuul_scientist_desc: "Чувствительные к Силе практикующие, способные видеть будущее через Силу, что делает их искусными в обращении с аномалиями."
 leader_trait_zakuul_governor: "Экзарх"
 leader_trait_zakuul_governor_desc: "Кибернетически усовершенствованные рыцари, которые служат военными губернаторами и квазирелигиозными номинальными главами назначенных им секторов."
 leader_trait_zakuul_general: "Рыцарь-капитан"
 leader_trait_zakuul_general_desc: "Чувствительные к силе командиры, ведущие в бой отряды рыцарей Закуула."
 leader_trait_zakuul_admiral: "Рыцарь-командир"
 leader_trait_zakuul_admiral_desc: "Чувствительные к силе командиры, которые руководят операциями внутри флота."
 leader_trait_zakuul_ruler: "Бессмертный Император"
 leader_trait_zakuul_ruler_desc: "Известный как Дракон Закуула, этот правитель бессмертен и почитаем всеми."
 FLAG_CATEGORY_Zakuul: "Вечная Империя"
 name_list_zakuul: "Вечная Империя"
 skytrooper_army: "Небесные десантники"
 skytrooper_army_desc: "Массовые боевые дроиды Вечной Империи, вооруженные бластерной винтовкой и встроенными реактивными ранцами. Лучше всего использовать в больших количествах."
 skytrooper_garrison: "Гарнизон небесных десантников"
 skytrooper_garrison_desc: "Отряд различных моделей небесных солдат, дислоцированных по всему миру для защиты от враждебной агрессии."
 elite_skytrooper_army: "Элитные небесные десантники"
 elite_skytrooper_army_desc: "Массовые боевые дроиды Вечной Империи, вооруженные бластерной винтовкой и встроенными реактивными ранцами. Эта модель представляет собой модернизированную версию традиционного небесного десантника с черной броней и чипами управления дроидами для координации легионов небесных десантников."
 siege_skytrooper: "Осадный небесный штурмовик"
 siege_skytrooper_desc: "Увеличенные модели тяжелых небесных десантников, созданные для тяжелых наземных боев и прямого нападения на большую технику."
 knights_of_zakuul: "Рыцари Закуула"
 knights_of_zakuul_desc: "Могущественные владетели силы и воины, служащие Бессмертному Императору Вечной Империи. Они верят, что Сила была инструментом, который можно было использовать для достижения справедливости, и черпали свою силу непосредственно от Императора."
 scions_of_zakuul: "Потомки Закуула"
 scions_of_zakuul_desc: "Подразделение рыцарей Закуула, обладавшее способностью видеть будущее посредством силы. Фанатически преданные своему императору, они обычно объединяются со стандартными рыцарями, образуя команду, обладающую как физическим, так и умственным мастерством."
 zakuul_exarch: "Экзарх"
 zakuul_exarch_desc: "Могущественный член Рыцарей Закуула, усиленный биологическими и кибернетическими улучшениями, создающий «идеальных» рыцарей."
 horizon_guard: "Страж горизонта"
 horizon_guard_desc: "Элитная группа могущественных силовиков, которые служат личными стражами и почетным караулом Верховного судьи Закуула."
 zakuul_walker: "Закуулан Уокер"
 zakuul_walker_desc: "Усовершенствованный двуногий бронированный шагоход, вооруженный боковыми лазерными пушками и основной лазерной пушкой, установленной на подбородке, используемый для тяжелых наземных атак."
 tech_eternal_empire_army: "Военные Вечной Империи"
 tech_eternal_empire_army_desc: "Военное подразделение Закуула и Вечного Трона. Открывает типы армий Вечной Империи."
 zakuul_start.4.name: "Прибытие Вечного флота"
 zakuul_start.4.desc: "Сигнал получен и в нашу систему прибыл отряд Вечного Флота. Все отряды Близнецов ждут ваших приказов от Вечного Трона."
 decision_activate_eternal_throne: "Призовите Вечный флот"
 decision_activate_eternal_throne_desc: "Активирует Вечный Трон, чтобы послать мощный сигнал для вызова отряда боевых кораблей Вечного Флота в глубокий космос."
 decision_activate_eternal_throne_effects: "§GПризывает в вашу столичную систему флот из 50 крейсеров под командованием капитана-Близнеца.§!"
 Eternal_Battlecruiser: "Военный корабль Вечного Флота"
 NAME_Eternal_Battlecruiser: "Военный корабль Вечного Флота"
 eternal_fleet_battlecruiser_plural: "Боевые корабли Вечного Флота"
 d_zakuul_spire: "Шпиль"
 d_zakuul_spire_desc: "В столице Закуула проживают миллионы людей внутри нескольких массивных вертикальных шпилей, уходящих почти в атмосферу. Внутри каждого находится сияющий золотой мегаполис, простирающийся от центральной башни."
 d_zakuul_sun_generators: "Солнечные генераторы"
 d_zakuul_sun_generators_desc: "Массивные генераторы энергии, содержащие миниатюрные звезды, используемые для питания шпилей Закуула."
 d_zakuul_old_world: "Старый Свет"
 d_zakuul_old_world_desc: "Первый город, построенный Вечной Империей на Закууле до того, как были созданы массивные шпили, которые теперь затмевают его."
 d_zakuul_undercity: "Подгород"
 d_zakuul_undercity_desc: "Район Закуула под массивными сверкающими шпилями, где правят коррупция и преступники. Вестники Зилдрога контролируют эту территорию, и на ее улицах процветают войны между бандами."
 d_zakuul_endless_swamp: "Бескрайнее болото"
 d_zakuul_endless_swamp_desc: "Заболоченная местность, покрытая лесом и покрывающая большую часть Закуула. Он лишен каких-либо поселений и является домом для множества опасных диких животных."
 nathema_ruins: "Руины Нафемы"
 nathema_ruins_desc: "Руины древней цивилизации Нафемы, разрушенной неизвестной катастрофой."
 voreclaw_beasts: "Звери Воркогня"
 voreclaw_beasts_desc: "Дикие монстры, бродящие по пустынным руинам Нафемы. Пережившие ужасную катастрофу, эти существа остались голодными, бродя по пустошам в поисках следующей добычи."
 ETERNAL_FLEET_ORD: "$ORD$ Линейный крейсер Вечного Флота"
 origin_star_forge: "Звёздная кузница"
 origin_star_forge_desc: "Эта империя недавно обнаружила огромную инопланетную космическую станцию, построенную древней расой, известной как ракатаны, в их родной системе."
 origin_tooltip_star_forge_effects: "Запуск на §YРаката Прайм§!; родной мир давно забытого древнего вида и контролирует Звездную Кузницу, огромную военную фабрику, которая обеспечивает обильное количество сплавов и энергии на орбите большой звезды."
 lehon_origin_init_NAME: "Система Лехон (Origin)"
 lehon_origin_init_DESC: "Начните на Раката Прайм; родной мир древних ракатов и местонахождение Звёздной кузницы."
 sith_emp_01: "КОТОР Ситхи"
 EMPIRE_DESIGN_SITH: "Империя ситхов"
 EMPIRE_DESIGN_SITH_desc: "§BРаката Прайм§!: Расположение Звёздной кузницы и секретной столицы Империи ситхов.\n\n§BBackground§!: После уничтожения его хозяин Дарт Реван, Дарт Малак, претендует на титул Темного Лорда Ситхов. Возглавляя армию темных джедаев и почти бесконечный запас кораблей и войск, Малак стремится завоевать известную галактику. Слава лорду Малаку, истинному повелителю ситхов и повелителю тёмной стороны!"
 civic_dark_side: "Орден ситхов"
 civic_dark_side_desc: "Мир — это ложь. Есть только Страсть. Запустите игру с технологией §YPsionic Theory§!. Эта гражданская модель также наделит вашего стартового правителя псионической чертой."
 civic_star_forge: "Технология ракатана"
 civic_star_forge_desc: "Интеграция древних ракатских технологий, дополненная литейными заводами Звёздной кузницы, значительно повысила эффективность, результативность и содержание этой империи, улучшенные автоматическими протоколами самовосстановления и питаемые энергией тёмной стороны."
 jcw_sithtroopers: "Солдаты ситхов"
 jcw_sithtroopers_desc: "Передовая пехота Армады ситхов. Каждый солдат ситхов покрыт полностью отражающим серебряным бронежилетом и оснащен ситхскими энергетическими щитами, бластерной винтовкой и виброклинком для ближнего боя."
 jcw_sith_heavy_troopers: "Тяжелые солдаты ситхов"
 jcw_sith_heavy_troopers_desc: "Элитные специалисты по тяжелому оружию в светоотражающих красных доспехах, нанятые ситхами, вооруженные тяжелыми многозарядными бластерами и щитами."
 jcw_sith_commandos: "Ситхи-коммандос"
 jcw_sith_commandos_desc: "Элитные тяжелобронированные ситхские солдаты в алых красных доспехах, вооруженные легкими многозарядными бластерами и пушками, которые используются в жестоких хирургических атаках."
 jcw_sith_assassins: "Ситхи-убийцы"
 jcw_sith_assassins_desc: "Специализированные охотники-ситхи, нанятые исключительно для того, чтобы выслеживать и убивать чувствительных к Силе, черпая свою силу из присутствия Силы в своей добыче. Каждый ситх-убийца оснащен скрытыми генераторами скрытого поля и вооружен в бою саблями."
 jcw_sith_starforge_wardroids: "Боевые дроиды Звёздная кузница"
 jcw_sith_starforge_wardroids_desc: "Вардроиды, созданные в кузницах Раката, облаченные в малиново-красную броню, оснащенные мощными дефлекторными щитами и вооруженные мощными бластерными пушками."
 jcw_sith_hk50_assassin_droids: "Дроиды-убийцы серии HK-50"
 jcw_sith_hk50_assassin_droids_desc: "Эти дроиды-садисты, созданные Дартом Реваном после успеха модели HK-47, служат в качестве единиц проникновения для уничтожения ценных целей. Каждый дроид защищен щитами и тяжело вооружен множеством смертоносных бластеров и встроенными модульными креплениями для оружия."
 jcw_sith_hk47_assassin_droid: "Дроид-убийца серии HK-47"
 jcw_sith_hk47_assassin_droid_desc: "Созданный Дартом Реваном как личный дроид-убийца, HK-47 представляет собой высокоразвитый, чрезвычайно вооруженный и умный дроид-убийца, который превосходно охотится на джедаев и уничтожает любого органического мешка с мясом с крайним ущербом."
 hk_47_limit_tooltip: "HK-47 может быть только один."
